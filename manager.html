<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyx Studio - 管理者后台</title>
  <meta name="description" content="Nyx Studio 管理者后台">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="bg-decoration"></div>
  <div class="stars-container"></div>

  <div class="main-content">
    <div class="container container-wide" id="pageContent"></div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script>
    // 先初始化变量
    let currentView = 'home';
    let selectedReceptionist = null;
    let cachedData = { orders: [], receptionists: [], penalties: [], announcements: [] };
    let isSubmitting = false;  // 防止重复提交

    // 加载弹窗函数
    function showLoadingOverlay(message = '正在添加中。。。请等待一下捏～<br>ꉂꉂ꒰•̤▿•̤*ૢ꒱') {
      if (document.getElementById('loadingOverlay')) return;
      isSubmitting = true;
      const overlay = document.createElement('div');
      overlay.id = 'loadingOverlay';
      overlay.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 9999;';
      overlay.innerHTML = `
        <div style="background: var(--bg-card); padding: 24px 32px; border-radius: 16px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 300px;">
          <div style="font-size: 32px; margin-bottom: 12px;">⏳</div>
          <p style="color: var(--text); font-size: 14px; line-height: 1.6;">${message}</p>
        </div>
      `;
      document.body.appendChild(overlay);
    }

    function hideLoadingOverlay() {
      isSubmitting = false;
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) overlay.remove();
    }

    // 检查权限
    const user = requireManager();
    if (!user) { /* 会自动跳转 */ } else { initApp(); }

    async function initApp() {
      showLoading('pageContent');
      await DataStore.evaluatePromotions(); // 每次登录/刷新自动评估升降级
      await loadAllData();
      renderHome();
    }

    async function loadAllData() {
      const [orders, receptionists, penalties, announcements, diviners, expenses] = await Promise.all([
        DataStore.getOrders(),
        DataStore.getReceptionists(),
        DataStore.getPenalties(),
        DataStore.getAnnouncements(),
        DataStore.getDiviners(),
        DataStore.getExpenses()
      ]);
      cachedData = { orders, receptionists, penalties, announcements, diviners, expenses };
    }

    async function refreshData() {
      await loadAllData();
    }

    async function setView(view, data = null) {
      currentView = view;
      selectedReceptionist = data;
      showLoading('pageContent');
      await refreshData();
      switch (view) {
        case 'home': renderHome(); break;
        case 'reviewOrders': renderReviewOrders(); break;
        case 'dailyIncome': selectedIncomeDate = getToday(); renderDailyIncome(); break;
        case 'weeklySettlement': selectedSettlementWeek = null; renderWeeklySettlement(); break;
        case 'submitBonus': renderSubmitBonus(); break;
        case 'taskManagement': renderTaskManagement(); break;
        case 'modifyCommission': renderModifyCommission(); break;
        case 'monthlyFlow': renderMonthlyFlow(); break;
        case 'manageReceptionists': renderManageReceptionists(); break;
        case 'internManagement': renderInternManagement(); break;
        case 'penalty': renderPenalty(); break;
        case 'announcement': renderAnnouncement(); break;
        case 'bossList': renderBossList(); break;
        case 'bossDetail': renderBossDetail(selectedReceptionist); break;
        case 'receptionistDetail': renderReceptionistDetail(selectedReceptionist); break;
        case 'divinerDetail': renderDivinerDetail(selectedReceptionist); break;
        case 'monthlyFlowDetail': renderMonthlyFlowDetail(selectedReceptionist); break;
        case 'divinerManagement': renderDivinerManagement(); break;
        case 'studioFinance': renderStudioFinance(); break;
        default: renderHome();
      }
    }

    function getBossBalanceSync(bossName) {
      const bossOrders = cachedData.orders.filter(o => o.bossName === bossName && o.approved !== false);
      const totalPrepaid = bossOrders.filter(o => o.type === 'prepaid').reduce((sum, o) => sum + (o.amount || 0), 0);
      const totalDeducted = bossOrders.filter(o => o.type === 'deduct_prepaid').reduce((sum, o) => sum + (o.amount || 0), 0);
      return totalPrepaid - totalDeducted;
    }

    function renderHeader() {
      return `
        <div class="page-header">
          <h1 class="page-title">🐯 管理者后台</h1>
          <button class="btn-text" onclick="logout()">退出登录</button>
        </div>

        ${currentView !== 'home' ? `
          <button class="btn-text mb-4 flex items-center gap-2" onclick="setView('${(currentView === 'bossList' || currentView === 'bossDetail' || currentView === 'divinerDetail' || currentView === 'receptionistDetail' || currentView === 'divinerManagement') ? 'manageReceptionists' : (currentView === 'submitBonus' || currentView === 'modifyCommission') ? 'taskManagement' : 'home'}')">
            ← 返回
          </button>
        ` : ''
        }
      `;
    }

    function renderHome() {
      const orders = cachedData.orders;
      const pendingCount = orders.filter(o => o.approved !== true && !o.rejectionReason).length;
      const receptionists = cachedData.receptionists.filter(r => r.role === 'receptionist' && !r.isDeleted);

      let html = renderHeader() + `<div class="card">`;

      html += `
        <div class="flex flex-col" style="gap: 20px;">
          <div style="position: relative;">
            <button class="btn btn-primary btn-full" style="justify-content: flex-start;" onclick="setView('reviewOrders')">
              ✅ 审核列表
            </button>
            ${pendingCount > 0 ? `<span class="notification-dot" style="position: absolute; top: 8px; right: 8px;"></span>` : ''}
          </div>
          <button class="btn btn-primary btn-full" style="justify-content: flex-start;" onclick="setView('dailyIncome')">📊 查看收入明细（每日）</button>
          <div style="position: relative; border: 2px solid #86efac; border-radius: 14px; padding: 3px; background: linear-gradient(135deg, rgba(134,239,172,0.08), rgba(74,222,128,0.05));">
            <span style="position: absolute; top: -8px; left: 12px; font-size: 12px;">🌿</span>
            <span style="position: absolute; top: -8px; right: 30px; font-size: 11px;">🍃</span>
            <span style="position: absolute; bottom: -8px; left: 30px; font-size: 11px;">🍃</span>
            <span style="position: absolute; bottom: -8px; right: 12px; font-size: 12px;">🌿</span>
            <span style="position: absolute; top: 50%; left: -8px; transform: translateY(-50%); font-size: 11px;">🌱</span>
            <span style="position: absolute; top: 50%; right: -8px; transform: translateY(-50%); font-size: 11px;">🌱</span>
            <button class="btn btn-secondary btn-full" style="justify-content: flex-start; border: none; margin: 0;" onclick="setView('studioFinance')">💰 查看工作室总收入与支出</button>
          </div>
          <button class="btn btn-secondary btn-full" style="justify-content: flex-start;" onclick="setView('monthlyFlow')">📈 当月接待累计流水</button>
          <button class="btn btn-secondary btn-full" style="justify-content: flex-start;" onclick="setView('taskManagement')">📋 周任务完成清单</button>
          <button class="btn btn-accent btn-full" style="justify-content: flex-start;" onclick="setView('weeklySettlement')">💵 周结算清单</button>
          <button class="btn btn-secondary btn-full" style="justify-content: flex-start;" onclick="setView('manageReceptionists')">🔍 查找信息与补录与接待管理</button>
          <button class="btn btn-secondary btn-full" style="justify-content: flex-start;" onclick="setView('announcement')">📢 通知公告系统</button>
          <button class="btn btn-danger btn-full" style="justify-content: flex-start;" onclick="setView('penalty')">⚠️ 惩罚系统</button>
        </div>
      </div>`;

      document.getElementById('pageContent').innerHTML = html;
    }

    // 工作室总收入与支出
    function renderStudioFinance() {
      const orders = cachedData.orders.filter(o => o.approved !== false);
      const expenses = cachedData.expenses || [];
      const diviners = cachedData.diviners || [];
      
      // Calculate Pure Profit per payment method
      let wechatIncome = 0;
      let alipayIncome = 0;

      orders.forEach(o => {
        const r = cachedData.receptionists.find(rec => rec.id === o.receptionistId);
        let recComm = 0;
        if (r) {
          if (o.type === 'bonus') {
            recComm = o.amount;
          } else if (o.type !== 'monthly' && o.type !== 'prepaid') {
            recComm = calculateCommission(o, r);
          }
        }
        
        let profit = calculateStudioIncomeForOrder(o, recComm, diviners);
        if (o.paymentMethod === 'alipay') {
          alipayIncome += profit;
        } else {
          wechatIncome += profit;
        }
      });

      // Calculate total expenses per method
      const wechatExpense = expenses.filter(e => e.paymentMethod === 'wechat').reduce((sum, e) => sum + (e.amount || 0), 0);
      const alipayExpense = expenses.filter(e => e.paymentMethod === 'alipay').reduce((sum, e) => sum + (e.amount || 0), 0);

      const netWechat = wechatIncome - wechatExpense;
      const netAlipay = alipayIncome - alipayExpense;
      const totalIncome = wechatIncome + alipayIncome;
      const totalExpense = wechatExpense + alipayExpense;
      const totalNet = netWechat + netAlipay;

      let html = renderHeader() + `
        <div class="card">
          <h2 style="font-size: 18px; margin-bottom: 24px;">💰 工作室总收入与支出</h2>
          
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
            <div style="background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); padding: 16px; border-radius: 12px; text-align: center;">
              <div style="font-size: 14px; color: var(--success); margin-bottom: 8px;">微信净收入</div>
              <div style="font-size: 24px; font-weight: bold; color: var(--success);">¥${netWechat.toFixed(2)}</div>
            </div>
            <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; padding: 16px; border-radius: 12px; text-align: center;">
              <div style="font-size: 14px; color: #3b82f6; margin-bottom: 8px;">支付宝净收入</div>
              <div style="font-size: 24px; font-weight: bold; color: #3b82f6;">¥${netAlipay.toFixed(2)}</div>
            </div>
          </div>

          <div style="background: var(--bg-light); padding: 16px; border-radius: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
            <div>
              <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">总历史纯利润 (收入)</div>
              <div style="font-size: 20px; font-weight: bold; color: var(--text);">¥${totalIncome.toFixed(2)}</div>
            </div>
            <div style="text-align: right;">
              <div style="font-size: 14px; color: ${totalExpense > 0 ? 'var(--danger)' : (totalExpense < 0 ? 'var(--success)' : 'var(--text)')}; margin-bottom: 4px;">历史${totalExpense >= 0 ? '总支出' : '净充值'}</div>
              <div style="font-size: 20px; font-weight: bold; color: ${totalExpense > 0 ? 'var(--danger)' : (totalExpense < 0 ? 'var(--success)' : 'var(--text)')};">${totalExpense > 0 ? '-' : (totalExpense < 0 ? '+' : '')}¥${Math.abs(totalExpense).toFixed(2)}</div>
            </div>
          </div>
          
          <div style="background: var(--bg-light); padding: 16px; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--accent); text-align: center;">
            <div style="font-size: 14px; color: var(--accent); margin-bottom: 4px;">总和净赚入兜</div>
            <div style="font-size: 28px; font-weight: bold; color: var(--accent);">¥${totalNet.toFixed(2)}</div>
          </div>

          <div style="display: flex; gap: 12px;">
            <button class="btn btn-primary flex-1" onclick="showExpenseModal()">📝 记录新支出</button>
            <button class="btn btn-primary flex-1" style="background-color: var(--success); border-color: var(--success);" onclick="showRechargeModal()">💰 充值资金</button>
          </div>
          
          <h3 style="font-size: 16px; margin: 24px 0 12px;">💸 历史收支明细</h3>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            ${expenses.length === 0 ? '<p class="text-muted text-center" style="padding: 20px 0;">暂无记录</p>' : ''}
            ${expenses.map(e => {
              const isRecharge = e.amount < 0;
              const displayAmount = Math.abs(e.amount).toFixed(2);
              const sign = isRecharge ? '+' : '-';
              const color = isRecharge ? 'var(--success)' : 'var(--danger)';
              return `
              <div style="background: var(--bg-light); padding: 12px 16px; border-radius: 8px; border-left: 3px solid ${color};">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                  <span style="font-weight: 600;">${e.reason}</span>
                  <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: ${color}; font-weight: bold;">${sign}¥${displayAmount}</span>
                    <button onclick="deleteExpenseRecord('${e.id}')" style="background: none; border: none; color: ${color}; font-size: 16px; cursor: pointer; padding: 2px 4px; opacity: 0.7;" title="删除此记录">🗑</button>
                  </div>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted);">
                  <span>日期: ${e.date}</span>
                  <span>方式: ${e.paymentMethod === 'alipay' ? '<span style="color: #3b82f6;">支付宝</span>' : '<span style="color: var(--success);">微信</span>'}</span>
                </div>
              </div>
            `}).join('')}
          </div>
        </div>

        <!-- 记录支出 Modal -->
        <div id="expenseModal" class="modal-overlay hidden">
          <div class="card modal-content">
            <h3 style="margin-bottom: 16px; color: var(--danger);">💸 记录支出</h3>
            <form id="expenseForm" onsubmit="handleExpenseSubmit(event)">
              <div class="form-group">
                <label class="form-label">支出日期</label>
                <input type="date" id="expenseDate" class="form-input" value="${getToday()}" required>
              </div>
              <div class="form-group">
                <label class="form-label">支出原因</label>
                <input type="text" id="expenseReason" class="form-input" placeholder="例如：购买塔罗牌" required>
              </div>
              <div class="form-group">
                <label class="form-label">支出金额 (元)</label>
                <input type="number" id="expenseAmount" class="form-input" min="0.01" step="0.01" required>
              </div>
              <div class="form-group">
                <label class="form-label">支出方式</label>
                <div style="display: flex; gap: 16px;">
                  <label><input type="radio" name="expensePaymentMethod" value="wechat" checked> 微信</label>
                  <label><input type="radio" name="expensePaymentMethod" value="alipay"> 支付宝</label>
                </div>
              </div>
              <div class="flex gap-3 mt-4">
                <button type="button" class="btn btn-secondary flex-1" onclick="closeExpenseModal()">取消</button>
                <button type="submit" class="btn btn-danger flex-1">确认提交</button>
              </div>
            </form>
          </div>
        </div>
        
        <!-- 充值资金 Modal -->
        <div id="rechargeModal" class="modal-overlay hidden">
          <div class="card modal-content">
            <h3 style="margin-bottom: 16px; color: var(--success);">💰 充值资金</h3>
            <form id="rechargeForm" onsubmit="handleRechargeSubmit(event)">
              <div class="form-group">
                <label class="form-label">充值日期</label>
                <input type="date" id="rechargeDate" class="form-input" value="${getToday()}" required>
              </div>
              <div class="form-group">
                <label class="form-label">充值原因</label>
                <input type="text" id="rechargeReason" class="form-input" placeholder="例如：注资" required>
              </div>
              <div class="form-group">
                <label class="form-label">充值金额 (元)</label>
                <input type="number" id="rechargeAmount" class="form-input" min="0.01" step="0.01" required>
              </div>
              <div class="form-group">
                <label class="form-label">充值方式</label>
                <div style="display: flex; gap: 16px;">
                  <label><input type="radio" name="rechargePaymentMethod" value="wechat" checked> 微信</label>
                  <label><input type="radio" name="rechargePaymentMethod" value="alipay"> 支付宝</label>
                </div>
              </div>
              <div class="flex gap-3 mt-4">
                <button type="button" class="btn btn-secondary flex-1" onclick="closeRechargeModal()">取消</button>
                <button type="submit" class="btn flex-1" style="background-color: var(--success); color: white;">确认充值</button>
              </div>
            </form>
          </div>
        </div>
      `;

      document.getElementById('pageContent').innerHTML = html;
    }

    function showExpenseModal() {
      document.getElementById('expenseModal').classList.remove('hidden');
    }

    function closeExpenseModal() {
      document.getElementById('expenseModal').classList.add('hidden');
      document.getElementById('expenseForm').reset();
    }

    async function deleteExpenseRecord(id) {
      if (!confirm('确定删除这条支出记录吗？')) return;
      showLoadingOverlay();
      const ok = await DataStore.deleteExpense(id);
      hideLoadingOverlay();
      if (ok) {
        await refreshData();
        renderStudioFinance();
      } else {
        alert('删除失败，请重试。');
      }
    }

    async function handleExpenseSubmit(e) {
      e.preventDefault();
      
      const date = document.getElementById('expenseDate').value;
      const reason = document.getElementById('expenseReason').value.trim();
      const amount = parseFloat(document.getElementById('expenseAmount').value);
      const paymentMethod = document.querySelector('input[name="expensePaymentMethod"]:checked').value;

      showLoadingOverlay();
      
      const result = await DataStore.saveExpense({ date, reason, amount, paymentMethod });
      
      hideLoadingOverlay();
      
      if (result) {
        alert('支出记录成功！');
        closeExpenseModal();
        await refreshData();
        renderStudioFinance();
      } else {
        // error already handled in utils.js
      }
    }

    function showRechargeModal() {
      document.getElementById('rechargeModal').classList.remove('hidden');
    }

    function closeRechargeModal() {
      document.getElementById('rechargeModal').classList.add('hidden');
      document.getElementById('rechargeForm').reset();
      document.getElementById('rechargeDate').value = getToday();
    }

    async function handleRechargeSubmit(e) {
      e.preventDefault();
      
      const date = document.getElementById('rechargeDate').value;
      const rawReason = document.getElementById('rechargeReason').value.trim();
      const reason = '充值 - ' + rawReason;
      const amount = -parseFloat(document.getElementById('rechargeAmount').value); // 负数代表充值(反向支出)
      const paymentMethod = document.querySelector('input[name="rechargePaymentMethod"]:checked').value;

      showLoadingOverlay();
      
      const result = await DataStore.saveExpense({ date, reason, amount, paymentMethod });
      
      hideLoadingOverlay();
      
      if (result) {
        alert('充值记录成功！');
        closeRechargeModal();
        await refreshData();
        renderStudioFinance();
      } else {
        // error already handled in utils.js
      }
    }

    // 老板名单视图
    function renderBossList() {
      // 默认加载所有有过预存单的老板
      const orders = cachedData.orders;
      // 获取所有有过预存单记录的老板名字（去重）
      // 注意：这里我们定义"有存单的老板"为至少下过一次 prepaid 类型订单的老板
      // 或者 是否包含 deduct_prepaid? 通常有过充值记录才算有存单老板。
      const prepaidBosses = [...new Set(
        orders
          .filter(o => o.type === 'prepaid' && o.bossName)
          .map(o => o.bossName)
      )];

      // 页面初始化
      let html = renderHeader() + `
        <div class="card">
          <h2 style="font-size: 18px; margin-bottom: 24px;">📖 老板名单</h2>
          
          <!-- 搜索框 -->
          <div style="margin-bottom: 20px; position: relative;">
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="text" id="bossListSearchInput" class="form-input" placeholder="搜索老板名称" style="margin-bottom: 0;">
              <button id="bossListSearchBtn" style="background: none; border: none; font-size: 24px; cursor: pointer; padding: 0 8px;">🐱</button>
            </div>
          </div>

          <!-- 老板列表容器 -->
          <div id="bossListContainer" style="display: flex; flex-direction: column; gap: 12px;">
             <!-- 内容由 JS 动态填充 -->
          </div>
        </div>
      `;

      document.getElementById('pageContent').innerHTML = html;

      // 渲染列表函数
      const renderList = (filterText = '') => {
        const container = document.getElementById('bossListContainer');

        let filteredBosses = prepaidBosses;
        if (filterText) {
          filteredBosses = prepaidBosses.filter(name => name.includes(filterText));
        }

        if (filteredBosses.length === 0) {
          container.innerHTML = '<p class="text-muted text-center">暂无相关老板记录</p>';
          return;
        }

        container.innerHTML = filteredBosses.map(bossName => {
          const balance = getBossBalanceSync(bossName);
          // Calculate total consumption
          const bossOrders = cachedData.orders.filter(o => o.bossName === bossName);
          const totalConsumption = bossOrders.reduce((sum, o) => {
            // 预存、正常、礼物、月卡都算在“店内总共消费”里
            // 唯独 deduct_prepaid 不算（因为是用存款消费，已经在 prepaid 时算过了? 或者用户意思是只要花了钱就算？)
            // 用户需求：预存+正常单+月卡（9.9）+礼物。（总共消费只算加起来的）
            if (o.type === 'monthly') return sum + 9.9;
            if (o.type === 'prepaid') return sum + (o.amount || 0); // 预存也算
            if (['normal', 'gift'].includes(o.type)) return sum + (o.amount || 0);
            // deduct_prepaid 被排除
            return sum;
          }, 0);

          return `
            <div onclick="setView('bossDetail', { name: '${bossName}' })" style="background: var(--bg-light); padding: 12px; border-radius: 8px; border-left: 3px solid var(--accent); cursor: pointer;">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                <span style="font-weight: bold; font-size: 16px;">老板：${bossName}</span>
                <span style="color: var(--accent); font-weight: bold;">余额: ¥${balance.toFixed(0)}</span>
              </div>
              <div style="font-size: 12px; color: var(--text-muted);">
                总共店内消费: <span style="color: var(--text);">¥${totalConsumption.toFixed(0)}</span>
              </div>
            </div>
          `;
        }).join('');
      };

      // 初始渲染
      renderList();

      // 绑定搜索事件
      document.getElementById('bossListSearchBtn').addEventListener('click', () => {
        const val = document.getElementById('bossListSearchInput').value.trim();
        renderList(val);
      });

      // 支持回车搜索
      document.getElementById('bossListSearchInput').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') {
          const val = e.target.value.trim();
          renderList(val);
        }
        // 也可以实时搜索，如果需要的话可以把下面注释打开
        // const val = e.target.value.trim();
        // renderList(val);
      });
    }

    // 审核订单视图
    function renderReviewOrders() {

      const pendingOrders = orders.filter(o => o.approved !== true && !o.rejectionReason);

      let html = renderHeader() + `
        <div class="card" style="padding-bottom: 80px;">
          <h2 style="font-size: 18px; margin-bottom: 24px;">✅ 审核列表</h2>
          ${pendingOrders.length === 0 ? `<p class="text-muted text-center" style="padding: 20px;">暂无待审核订单</p>` :
          `<div>
            <p class="text-muted mb-4">共 ${pendingOrders.length} 条待审核</p>
            ${pendingOrders.map(order => {
            const r = receptionists.find(rec => rec.id === order.receptionistId);

            // 计算提成数据
            let recComm = 0;
            let stuComm = 0;
            let divComm = 0;
            let price = order.amount || 0;

            if (order.type === 'monthly') {
              // 月卡单特殊处理
              price = 0;
              stuComm = 9.9;
            } else if (order.type === 'bonus') {
              recComm = order.amount;
            } else if (order.type === 'prepaid') {
              // 预存单：只记录余额，不计算任何提成
              recComm = 0;
              stuComm = 0;
              divComm = 0;
            } else {
              const diviners = cachedData.diviners || [];
              recComm = calculateCommission(order, r || { commissionRate: 5 });
              if (order.divinerId === '虎虎') {
                // 虎虎拿100%，工作室净利润 = -recComm
                divComm = price;
                stuComm = -recComm;
              } else {
                stuComm = calculateStudioIncomeForOrder(order, recComm, diviners);
                divComm = Math.max(0, price - recComm - stuComm);
              }
            }
            const typeName = getOrderTypeName(order.type);
            const typeColor = getOrderTypeColor(order.type);

            let displayHtml = '';

            // 格式化输出
            // 预存: 日期：xxx，老板x ，预存+100。当前余额xxx（右边对齐）

                   <span style="font-weight: bold; color: var(--accent);">当前余额：${getBossBalanceSync(order.bossName).toFixed(0)}</span>
                 </div>
               `;
            }
            // 扣除: 日期：xxx，老板x，问题：xx，使用-99，当前余额xxx（右边对齐）
            else if (order.type === 'deduct_prepaid') {
              displayHtml = `
                 <div style="display: flex; justify-content: space-between; align-items: center;">
                   <span>日期：${formatDate(order.date)}，老板 ${order.bossName}，问题：${order.questionContent || '无'}，使用 <span style="color: var(--danger);">-${price}</span></span>
                   <span style="font-weight: bold; color: var(--accent);">当前余额：${getBossBalanceSync(order.bossName).toFixed(0)}</span>
                 </div>
               `;
            }
            // 其他类型 (正常/礼物) - 虽然不涉及余额变动(通常是现结?) 但为了记录完整性还是显示，或者根据余额逻辑它们不影响余额？
            // 假设 Boss Balance 只受 prepaid/deduct 影响。
            // 但如果 "正常单" 也是记账？原逻辑里 getBossBalance 只算 prepaid - deduct。
            // 所以这里其他单子 就按普通显示，或者不显示余额？
            // 实际上 getBossBalance 里： normal/gift 不影响余额
            else {
              const typeName = getOrderTypeName(order.type);
              const amountText = price;
              displayHtml = `
                 <div style="display: flex; justify-content: space-between; align-items: center;">
                   <span>日期：${formatDate(order.date)}，老板 ${order.bossName}，${typeName} <span style="color: var(--text);">${amountText}</span></span>
                   <span style="color: var(--text-muted); font-size: 12px;">(非余额消费)</span>
                 </div>
               `;
            }

            return `
                <div style="background: var(--bg-light); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden;">
                  <!-- Header: 接待信息与操作按钮 -->
                  <div style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                      <span style="font-size: 18px;">${r ? r.emoji : '👤'}</span>
                      <span style="font-weight: 600; font-size: 16px;">${r ? r.name : '未知'}</span>
                      <span style="background: ${typeColor}20; color: ${typeColor}; font-size: 12px; padding: 2px 8px; border-radius: 4px;">${typeName}</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                      <button onclick="rejectOrder(${order.id})" style="width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--danger); background: transparent; color: var(--danger); display: flex; align-items: center; justify-content: center; cursor: pointer;">✕</button>
                      <button onclick="approveOrder(${order.id})" style="width: 36px; height: 36px; border-radius: 8px; background: var(--success); border: none; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer;">✓</button>
                    </div>
                  </div>
                  
                  <!-- Body: 详细数据 -->
                   <div style="padding: 20px;">
                    <!-- 金额数据区域 -->
                    ${order.type === 'monthly' ? `
                      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span class="text-muted">单子类型：</span>
                        <span style="color: var(--success); font-weight: 600;">月卡单</span>
                      </div>
                       <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span class="text-muted">工作室收入：</span>

                        ${order.discount ? `
                          <span style="color: #ec4899; font-weight: 600;">¥${price.toFixed(0)} <span style="font-size: 12px; opacity: 0.8;">(${order.discount}折 原价¥${order.originalAmount})</span></span>

                      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span class="text-muted">接待提成：</span>
                        <span style="color: var(--primary-light); font-weight: 600;">¥${recComm.toFixed(2)}</span>
                      </div>
                      ${order.type !== 'bonus' ? `
                      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span class="text-muted">占卜师提成：</span>
                        <span style="color: var(--warning); font-weight: 600;">¥${divComm.toFixed(2)}</span>
                      </div>
                      <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span class="text-muted">工作室提成：</span>
                        <span style="color: ${stuComm < 0 ? 'var(--danger)' : 'var(--success)'}; font-weight: 600;">${stuComm < 0 ? '-' : ''}¥${Math.abs(stuComm).toFixed(2)}</span>
                      </div>` : ''}
                    `}

                    <!-- 分割线 -->
                    <div style="height: 1px; background: var(--border); margin: 16px 0;"></div>

                    <!-- 问题内容 -->
                    <div>
                      <span class="text-muted mb-2" style="display: block;">问题内容：</span>
                      <p style="color: var(--text); line-height: 1.5; font-size: 15px;">${order.questionContent || '无'}</p>
                    </div>
                  </div>

                  <!-- Footer: 元数据 -->
                  <div style="padding: 12px 20px; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);">
                    <span>老板：${order.bossName}</span>
                    ${order.divinerId && order.divinerId !== '无' ? `<span>占卜师：${order.divinerId}</span>` : '<span></span>'}
                    <span>${order.date}</span>
                  </div>
                </div>
              `;
          }).join('')}
          </div>`
        }
        </div >
        `;
      document.getElementById('pageContent').innerHTML = html;
    }

    async function approveOrder(orderId) {
      await DataStore.approveOrder(orderId);
      await refreshData();
      renderReviewOrders();
    }

    async function rejectOrder(orderId) {
      const reason = prompt('请填写审核不通过原因：');
      if (reason !== null) {  // 用户没有点击取消
        const rejectionReason = reason.trim() || '未填写原因';
        await DataStore.updateOrder(orderId, {
          approved: false,
          rejectionReason: rejectionReason
        });
        await refreshData();
        renderReviewOrders();
        alert('订单已驳回，接待会在页面看到提示');
      }
    }

    // 日期选择器
    let datePickerMonth = new Date();  // 当前显示的月份

    function showDatePicker() {
      datePickerMonth = new Date(selectedIncomeDate);  // 初始化为当前选中的日期所在月
      renderDatePicker();
    }

    function renderDatePicker() {
      const year = datePickerMonth.getFullYear();
      const month = datePickerMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay(); // 0=周日
      const daysInMonth = lastDay.getDate();

      // 计算当月每一天的收入，找出最高的一天
      const orders = cachedData.orders || [];
      let dailyIncomes = {};
      let maxIncome = 0;
      let maxIncomeDate = null;

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayOrders = orders.filter(o => o.date === dateStr && o.approved !== false);
        const income = calculateTotalStudioIncome(dayOrders);
        dailyIncomes[dateStr] = income;

        if (income > maxIncome) {
          maxIncome = income;
          maxIncomeDate = dateStr;
        }
      }

      // 生成日历格子
      let calendarHtml = '';
      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      calendarHtml += '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center;">';

      // 星期标题
      weekdays.forEach(d => {
        calendarHtml += `<div style="font-size: 12px; color: var(--text-muted); padding: 8px 0;">${d}</div>`;
      });

      // 空白格子（月初前的）
      for (let i = 0; i < startWeekday; i++) {
        calendarHtml += '<div></div>';
      }

      // 日期格子
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isSelected = dateStr === selectedIncomeDate;
        const isToday = dateStr === getToday();
        const isMaxIncome = dateStr === maxIncomeDate && maxIncome > 0;

        calendarHtml += `
          <div onclick="selectDate('${dateStr}')" style="padding: 8px; cursor: pointer; border-radius: 8px; position: relative;
            ${isSelected ? 'background: var(--accent); color: #000; font-weight: bold;' : ''}
            ${isToday && !isSelected ? 'border: 2px solid var(--primary);' : ''}
            transition: background 0.2s;"
            onmouseover="this.style.background = this.style.background || 'var(--bg-hover)'"
            onmouseout="this.style.background = '${isSelected ? 'var(--accent)' : ''}'">
            ${day}${isMaxIncome ? '<span style="position: absolute; top: -2px; right: -2px; font-size: 12px; color: #9d8b9e;">☆</span>' : ''}
          </div>
        `;
      }

      calendarHtml += '</div>';

      // 创建弹窗
      const existingModal = document.getElementById('datePickerModal');
      if (existingModal) existingModal.remove();

      const modal = document.createElement('div');
      modal.id = 'datePickerModal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;';
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
      modal.innerHTML = `
        <div style="background: var(--bg-card); border-radius: 16px; padding: 20px; max-width: 320px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <button onclick="changePickerMonth(-1)" style="background: var(--bg-hover); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;">◀</button>
            <span style="font-size: 16px; font-weight: 600;">${year}年${month + 1}月</span>
            <button onclick="changePickerMonth(1)" style="background: var(--bg-hover); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px;">▶</button>
          </div>
          ${calendarHtml}
          <button onclick="document.getElementById('datePickerModal').remove()" style="width: 100%; margin-top: 16px; padding: 10px; background: var(--bg-hover); border: none; border-radius: 8px; color: var(--text); cursor: pointer;">取消</button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    function changePickerMonth(delta) {
      datePickerMonth.setMonth(datePickerMonth.getMonth() + delta);
      renderDatePicker();
    }

    function selectDate(dateStr) {
      document.getElementById('datePickerModal').remove();
      renderDailyIncome(dateStr);
    }

    // 删除订单功能
    async function deleteOrder(orderId, event) {
      // 阻止事件冒泡，防止触发折叠/展开
      if (event) {
        event.stopPropagation();
      }

      if (!confirm('确定要删除这条订单吗？删除后将重新计算收入。')) {
        return;
      }

      await DataStore.deleteOrder(orderId);
      await refreshData();

      // 根据当前视图刷新或跳转
      if (currentView === 'monthlyFlowDetail' && currentDetailReceptionist && currentDetailReceptionist.id === 'all') {
        setView('monthlyFlow'); // 工作室总览模式删除后返回列表
      } else {
        // 其他情况刷新当前视图
        setView(currentView, selectedReceptionist || currentDetailReceptionist);
      }
    }

    // 周结算清单视图 - 支持选择周
    let selectedSettlementWeek = null;  // null 表示当前周

    async function renderWeeklySettlement(targetWeekStart) {
      if (targetWeekStart) selectedSettlementWeek = targetWeekStart;
      const orders = cachedData.orders;
      const receptionists = cachedData.receptionists;

      // 使用选中的周或当前周
      const weekStart = selectedSettlementWeek ? new Date(selectedSettlementWeek) : getWeekStart();
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate() + 6);
      weekEnd.setHours(23, 59, 59, 999);

      const isCurrentWeek = formatDate(weekStart) === formatDate(getWeekStart());
      const weekLabel = isCurrentWeek ? '本周' : `${weekStart.getMonth() + 1}/${weekStart.getDate()} - ${weekEnd.getMonth() + 1}/${weekEnd.getDate()}`;

      const weekOrders = orders.filter(o => new Date(o.date) >= weekStart && new Date(o.date) <= weekEnd && o.approved !== false);
      const weeklyIncome = calculateTotalStudioIncome(weekOrders);
      const settledIds = await DataStore.getSettledIds();
      const allReceptionists = receptionists.filter(r => r.role === 'receptionist');

      // 获取本周结算历史（从 localStorage）
      const weekKey = formatDate(weekStart);
      const settlementHistoryKey = `nyx_settlement_history_${weekKey}`;
      let settlementHistory = JSON.parse(localStorage.getItem(settlementHistoryKey) || '{}');

      // 创建结算条目列表
      let settlementEntries = [];

      allReceptionists.forEach(r => {
        // 获取该接待本周所有订单
        const allROrders = weekOrders.filter(o => o.receptionistId === r.id);
        if (r.isDeleted && allROrders.length === 0) return;

        // 获取该接待的结算时间数组（按时间排序）
        let rHistory = settlementHistory[r.id] || [];

        // ── 如果 localStorage 无历史，但 DB 说已结算 → 用 DB 数据补全 ──────────
        if (rHistory.length === 0 && isCurrentWeek && settledIds.includes(r.id) && r.lastSettlementDate) {
          rHistory = [r.lastSettlementDate];
          // 同步写回 localStorage 以保证后续操作正常
          settlementHistory[r.id] = rHistory;
          localStorage.setItem(settlementHistoryKey, JSON.stringify(settlementHistory));
        }
        // ────────────────────────────────────────────────────────────────────────

        const sortedHistory = [...rHistory].sort((a, b) => new Date(a) - new Date(b));

        if (sortedHistory.length === 0) {
          // 从未结算：显示所有订单
          settlementEntries.push({
            receptionist: r,
            orders: allROrders,
            isSettled: false,
            isPostSettlement: false,
            periodIndex: 0,
            label: '',
            sortedHistory: []
          });
        } else {
          // 有结算历史：按结算时间点分割订单
          let previousTime = 0;

          sortedHistory.forEach((settlementTime, index) => {
            const settlementTs = new Date(settlementTime).getTime();
            const periodOrders = allROrders.filter(o => {
              const orderTime = new Date(o.createdAt).getTime();
              return orderTime > previousTime && orderTime <= settlementTs;
            });

            // 创建已结算条目
            if (periodOrders.length > 0 || index === 0) {
              settlementEntries.push({
                receptionist: r,
                orders: periodOrders,
                isSettled: true,
                isPostSettlement: false,
                periodIndex: index + 1,
                label: sortedHistory.length > 1 ? `(第${index + 1}次结算)` : '',
                sortedHistory: sortedHistory
              });
            }

            previousTime = settlementTs;
          });

          // 检查是否有结算后的新订单
          const lastSettlementTime = new Date(sortedHistory[sortedHistory.length - 1]).getTime();
          const postOrders = allROrders.filter(o => new Date(o.createdAt).getTime() > lastSettlementTime);

          if (postOrders.length > 0) {
            settlementEntries.push({
              receptionist: r,
              orders: postOrders,
              isSettled: false,
              isPostSettlement: true,
              periodIndex: sortedHistory.length + 1,
              label: '(结算后新增)',
              sortedHistory: sortedHistory
            });
          }
        }
      });

      // 排序：有金额优先、金额大优先、已结算排最后
      settlementEntries.sort((a, b) => {
        // 已结算排最后
        if (a.isSettled && !b.isSettled) return 1;
        if (!a.isSettled && b.isSettled) return -1;

        // 计算金额
        const amountA = a.orders.reduce((sum, o) => {
          const nOcc = a.orders.filter(ord => ord.type === 'normal').length;
          return sum + calculateCommission(o, a.receptionist || {}, nOcc > 5 ? 10 : 5);
        }, 0);
        const amountB = b.orders.reduce((sum, o) => {
          const nOcc = b.orders.filter(ord => ord.type === 'normal').length;
          return sum + calculateCommission(o, b.receptionist || {}, nOcc > 5 ? 10 : 5);
        }, 0);

        // 有金额的优先，金额大的优先
        if (amountA === 0 && amountB > 0) return 1;
        if (amountA > 0 && amountB === 0) return -1;
        return amountB - amountA;  // 金额从大到小
      });

      let html = renderHeader() + `
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
            <h2 style="font-size: 18px; margin: 0;">💵 周结算清单</h2>
            <button onclick="showWeekPicker()" style="background: var(--primary); color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;">📅 选择周</button>
          </div>
          <div class="stats-section stats-section-green text-center mb-5" style="cursor: pointer;">
            <p class="text-muted mb-2">${weekLabel}工作室收入</p>
            <p style="font-size: 32px; font-weight: 700; color: var(--success);">¥${weeklyIncome.toFixed(2)}</p>
            ${!isCurrentWeek ? `<p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">查看历史周数据</p>` : ''}
          </div>
          <h3 style="font-size: 16px; margin-bottom: 12px;">接待统计</h3>
          ${settlementEntries.map(entry => {
        const r = entry.receptionist;
        const rOrders = entry.orders;
        const isSettled = entry.isSettled;

        // 本期订单统计
        const stats = {
          monthly: rOrders.filter(o => o.type === 'monthly').length,
          normal: rOrders.filter(o => o.type === 'normal').length,
          prepaid: rOrders.filter(o => o.type === 'prepaid').length,
          gift: rOrders.filter(o => o.type === 'gift').length,
          bonus: rOrders.filter(o => o.type === 'bonus').length,
        };

        // 获取本周累计进度（为了判断是否在本次结算跨过门槛）
        const getCumulativeOrders = (ts) => weekOrders.filter(o => new Date(o.createdAt).getTime() <= ts);
        const getFlow = (os) => os.reduce((s, o) => s + (o.type === 'monthly' ? 9.9 : (o.type === 'bonus' ? 0 : (o.amount || 0))), 0);
        const getPrepaid = (os) => os.filter(o => o.type === 'prepaid').reduce((s, o) => s + (o.amount || 0), 0);

        // 本次结算的时间区间
        const sortedHistory = entry.sortedHistory || [];
        const periodEndTs = entry.isSettled ? new Date(sortedHistory[entry.periodIndex - 1]).getTime() : new Date().getTime();
        const periodStartTs = entry.periodIndex > 1 ? new Date(sortedHistory[entry.periodIndex - 2]).getTime() : 0;

        const cumulativeOrdersAtEnd = getCumulativeOrders(periodEndTs).filter(o => o.receptionistId === r.id);
        const cumulativeOrdersAtStart = getCumulativeOrders(periodStartTs).filter(o => o.receptionistId === r.id);

        // 1. 动态提成率（基于周总数）
        const weeklyNormalCount = weekOrders.filter(o => o.receptionistId === r.id && o.type === 'normal').length;
        const normalRateOverride = weeklyNormalCount > 5 ? 10 : 5;

        let orderCommission = 0;
        rOrders.forEach(order => {
          if (order.type !== 'bonus' && order.type !== 'monthly') {
            orderCommission += calculateCommission(order, r || { commissionRate: 5 }, normalRateOverride);
          }
        });

        // 2. 奖励逻辑（首次跨过门槛时发放）
        const endMonthly = cumulativeOrdersAtEnd.filter(o => o.type === 'monthly').length;
        const startMonthly = cumulativeOrdersAtStart.filter(o => o.type === 'monthly').length;

        // 底薪 (3单月卡)
        const baseSalary = r.isIntern ? 20 : 40;
        const awardedBaseSalary = (endMonthly >= 3 && startMonthly < 3) ? baseSalary : 0;

        // 额外奖金
        const endFlow = getFlow(cumulativeOrdersAtEnd);
        const startFlow = getFlow(cumulativeOrdersAtStart);
        const endPrepaid = getPrepaid(cumulativeOrdersAtEnd);
        const startPrepaid = getPrepaid(cumulativeOrdersAtStart);

        let extraBonus = 0;
        if (endFlow >= 500 && startFlow < 500) extraBonus += 15;
        if (endPrepaid >= 666 && startPrepaid < 666) extraBonus += 15;
        if (endMonthly >= 9 && startMonthly < 9) extraBonus += 15;

        const bonusAmount = rOrders.filter(o => o.type === 'bonus').reduce((sum, o) => sum + o.amount, 0);
        let extraBonusDetails = [];
        if (awardedBaseSalary > 0) extraBonusDetails.push(`底薪(¥${awardedBaseSalary})`);
        if (endFlow >= 500 && startFlow < 500) extraBonusDetails.push('周流水奖励(¥15)');
        if (endPrepaid >= 666 && startPrepaid < 666) extraBonusDetails.push('预存奖励(¥15)');
        if (endMonthly >= 9 && startMonthly < 9) extraBonusDetails.push('月卡奖励(¥15)');

        // 惩罚金额
        const weeklyPenalties = (r.penalties || []).filter(p => new Date(p.date) >= weekStart);
        const penaltyAmount = isSettled ? 0 : weeklyPenalties.reduce((sum, p) => sum + p.amount, 0);

        // 任务完成状态计算（用本周所有该接待的订单）
        const allMyWeekOrders = weekOrders.filter(o => o.receptionistId === r.id);
        const weeklyFlow = allMyWeekOrders.reduce((s, o) => s + (o.type === 'monthly' ? 9.9 : (o.type === 'bonus' ? 0 : (o.amount || 0))), 0);
        const prepaidTotal = allMyWeekOrders.filter(o => o.type === 'prepaid').reduce((s, o) => s + (o.amount || 0), 0);
        const mandatoryTaskComplete = stats.monthly >= 3;
        const flowTaskComplete = weeklyFlow >= 500;
        const prepaidTaskComplete = prepaidTotal >= 666;
        const monthlyTaskComplete = stats.monthly >= 9;
        const actualBaseSalary = mandatoryTaskComplete ? baseSalary : 0;

        const totalSalary = Math.max(0, awardedBaseSalary + orderCommission + bonusAmount + extraBonus - penaltyAmount);

        return `
              <div class="list-item" style="${isSettled ? 'background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); opacity: 0.7;' : entry.isPostSettlement ? 'border: 2px solid var(--accent);' : ''}">
                <div class="list-item-header">
                  <span class="list-item-avatar">${r.emoji}</span>
                  <div class="flex-1">
                    <span class="font-bold">${r.name}</span>
                    ${entry.label ? `<span class="text-xs" style="color: ${entry.isPostSettlement ? 'var(--accent)' : 'var(--success)'}; margin-left: 8px;">${entry.label}</span>` : ''}
                    ${r.isIntern ? '<span class="text-xs" style="color: var(--warning); margin-left: 8px;">实习</span>' : ''}
                    ${r.isDeleted ? '<span class="text-xs" style="color: var(--danger); margin-left: 8px;">(已注销)</span>' : ''}
                  </div>
                  ${!r.isDeleted ? `
                    <button class="settle-checkbox ${isSettled ? 'checked' : ''}" onclick="${isSettled ? `undoSettlement('${r.id}')` : `toggleSettlement('${r.id}')`}" style="${isSettled ? 'background: var(--success); border-color: var(--success);' : ''}">
                      ${isSettled ? '✓' : ''}
                    </button>
                  ` : ''}
                </div>
                <div class="list-item-stats mb-3">
                  <span class="order-type-monthly">月卡 ${stats.monthly}</span>
                  <span class="order-type-normal">正常 ${stats.normal}</span>
                  <span class="order-type-prepaid">预存 ${stats.prepaid}</span>
                  <span class="order-type-gift">礼物 ${stats.gift}</span>
                  <span class="order-type-bonus">奖励 ${stats.bonus}</span>
                </div>
                
                <!-- 任务完成状态 -->
                <div style="margin-bottom: 12px; padding: 8px; background: var(--bg-light); border-radius: 8px; font-size: 12px;">
                  <div style="margin-bottom: 4px; font-weight: bold; color: ${mandatoryTaskComplete ? 'var(--success)' : 'var(--danger)'};">
                    ${mandatoryTaskComplete ? '✓' : '✗'} 强制任务：月卡3单 (${stats.monthly}/3)
                  </div>
                  <div style="display: flex; flex-wrap: wrap; gap: 8px; color: var(--text-muted);">
                    <span style="color: ${mandatoryTaskComplete && flowTaskComplete ? 'var(--success)' : 'var(--text-muted)'};">
                      ${mandatoryTaskComplete && flowTaskComplete ? '✓' : '○'} 周流水500 (¥${weeklyFlow.toFixed(0)})
                    </span>
                    <span style="color: ${mandatoryTaskComplete && prepaidTaskComplete ? 'var(--success)' : 'var(--text-muted)'};">
                      ${mandatoryTaskComplete && prepaidTaskComplete ? '✓' : '○'} 预存666 (¥${prepaidTotal.toFixed(0)})
                    </span>
                    <span style="color: ${mandatoryTaskComplete && monthlyTaskComplete ? 'var(--success)' : 'var(--text-muted)'};">
                      ${mandatoryTaskComplete && monthlyTaskComplete ? '✓' : '○'} 月卡9单 (${stats.monthly}/9)
                    </span>
                  </div>
                </div>
                
                <div class="salary-detail">
                  <div class="salary-row"><span class="text-muted">底薪：</span><span ${!mandatoryTaskComplete ? 'style="color: var(--danger);"' : ''}>${mandatoryTaskComplete ? '¥' + actualBaseSalary : '¥0 <span style="font-size: 12px; text-decoration: line-through; opacity: 0.5;">(' + baseSalary + ')</span>'}</span></div>
                  <div class="salary-row"><span class="text-muted">单子提成：</span><span style="color: var(--accent);">¥${orderCommission.toFixed(2)}</span></div>
                  <div class="salary-row"><span class="text-muted">奶茶类型奖项：</span><span style="color: ${bonusAmount > 0 ? 'var(--bonus)' : 'var(--text)'};">¥${bonusAmount.toFixed(2)}</span></div>
                  ${extraBonus > 0 ? `<div class="salary-row"><span class="text-muted">任务奖励：</span><span style="color: var(--success);">+¥${extraBonus} (${extraBonusDetails.join(', ')})</span></div>` : ''}
                  <div class="salary-row"><span class="text-muted">惩罚项：</span><span style="color: ${penaltyAmount > 0 ? 'var(--danger)' : 'var(--text)'};">${penaltyAmount > 0 ? '-' : ''}¥${penaltyAmount.toFixed(2)}</span></div>
                  <div class="salary-total">
                    <span>总共结算工资：</span>
                    <span style="color: var(--accent);">¥${totalSalary.toFixed(2)}${!mandatoryTaskComplete ? ' (未完成强制任务)' : ''}</span>
                  </div>
                </div>
                ${isSettled ? '<p class="text-center text-xs mt-2" style="color: var(--success);">✓ 已结算</p>' : ''}
              </div>
            `;
      }).join('')
        }
        </div >
        `;
      document.getElementById('pageContent').innerHTML = html;
    }

    async function toggleSettlement(rid) {
      const receptionist = cachedData.receptionists.find(r => r.id === rid);
      const receptionistName = receptionist?.name || '该接待';

      // 使用选中的周或当前周
      const weekStart = selectedSettlementWeek ? new Date(selectedSettlementWeek) : getWeekStart();
      const isCurrentWeek = formatDate(weekStart) === formatDate(getWeekStart());
      const weekKey = formatDate(weekStart);
      const settlementHistoryKey = `nyx_settlement_history_${weekKey}`;
      let settlementHistory = JSON.parse(localStorage.getItem(settlementHistoryKey) || '{}');

      const rHistory = settlementHistory[rid] || [];
      const newSettlementDate = new Date().toISOString();

      // 添加新的结算时间到历史
      rHistory.push(newSettlementDate);
      settlementHistory[rid] = rHistory;
      localStorage.setItem(settlementHistoryKey, JSON.stringify(settlementHistory));

      // ── 结算时计算并记录任务奖励和奶茶类型奖项支出 ──────────────────────
      try {
        const weekOrders = cachedData.orders.filter(o =>
          o.approved !== false &&
          o.receptionistId === rid &&
          new Date(o.createdAt || o.date) >= weekStart
        );

        // 奶茶类型奖项（bonus 单金额之和）
        const bonusAmount = weekOrders.filter(o => o.type === 'bonus').reduce((s, o) => s + (o.amount || 0), 0);

        // 任务奖励（底薪 + 额外里程碑）
        const weeklyMonthlyCount = weekOrders.filter(o => o.type === 'monthly').length;
        const weeklyFlow = weekOrders.reduce((s, o) => s + (o.type === 'monthly' ? 9.9 : (o.type === 'bonus' ? 0 : (o.amount || 0))), 0);
        const weeklyPrepaid = weekOrders.filter(o => o.type === 'prepaid').reduce((s, o) => s + (o.amount || 0), 0);

        const mandatoryDone = weeklyMonthlyCount >= 3;
        const baseSalaryAmt = mandatoryDone ? (receptionist?.isIntern ? 20 : 40) : 0;
        let extraBonus = 0;
        if (mandatoryDone && weeklyFlow >= 500) extraBonus += 15;
        if (mandatoryDone && weeklyPrepaid >= 666) extraBonus += 15;
        if (mandatoryDone && weeklyMonthlyCount >= 9) extraBonus += 15;

        const taskTotal = baseSalaryAmt + extraBonus;
        const today = formatDate(new Date());

        // 用于追踪本次结算产生的 expense IDs，以便撤销时删除
        const settlementExpenseKey = `nyx_settlement_expenses_${weekKey}_${rid}_${rHistory.length}`;
        const savedExpenseIds = [];

        // 记录任务奖励到 expenses（如果大于0）
        if (taskTotal > 0) {
          const saved = await DataStore.saveExpense({
            date: today,
            reason: `${receptionistName} 周结算任务奖励（底薪¥${baseSalaryAmt}+里程碑¥${extraBonus}）`,
            amount: taskTotal,
            paymentMethod: 'wechat'
          });
          if (saved?.id) savedExpenseIds.push(saved.id);
        }

        // 记录奶茶类型奖项到 expenses（如果大于0）
        if (bonusAmount > 0) {
          const saved = await DataStore.saveExpense({
            date: today,
            reason: `${receptionistName} 周结算奶茶类型奖项`,
            amount: bonusAmount,
            paymentMethod: 'wechat'
          });
          if (saved?.id) savedExpenseIds.push(saved.id);
        }

        // 把产生的 expense IDs 存入 localStorage，供撤销时使用
        if (savedExpenseIds.length > 0) {
          localStorage.setItem(settlementExpenseKey, JSON.stringify(savedExpenseIds));
        }
      } catch (e) {
        console.warn('结算时记录支出失败（不影响结算本身）:', e);
      }
      // ─────────────────────────────────────────────────────────────────────

      // 只有当前周才更新数据库（影响接待页面）
      if (isCurrentWeek) {
        // 更新数据库中的 lastSettlementDate
        const updateResult = await DataStore.updateReceptionist(rid, {
          lastSettlementDate: newSettlementDate
        });

        // 确保 settledIds 包含此接待
        const settledIds = await DataStore.getSettledIds();
        if (!settledIds.includes(rid)) {
          await DataStore.setSettled(rid, true);
        }

        localStorage.removeItem(`nyx_promo_${rid}`);

        if (updateResult) {
          const settlementCount = rHistory.length;
          alert(`✅ ${receptionistName} 第${settlementCount}次结算完成！\n\n接待员刷新页面后余额将重置。`);
        } else {
          alert(`❌ 结算失败！请检查控制台错误信息。`);
        }
      } else {
        // 过去周：只记录，不影响接待页面
        const settlementCount = rHistory.length;
        alert(`✅ ${receptionistName} 历史结算已记录！\n\n（过去周结算仅供管理记录，不影响接待员页面）`);
      }

      await refreshData();
      renderWeeklySettlement();
    }

    // 撤销最后一次结算
    async function undoLastSettlement(rid) {
      const receptionist = cachedData.receptionists.find(r => r.id === rid);
      const receptionistName = receptionist?.name || '该接待';

      // 使用选中的周或当前周
      const weekStart = selectedSettlementWeek ? new Date(selectedSettlementWeek) : getWeekStart();
      const isCurrentWeek = formatDate(weekStart) === formatDate(getWeekStart());
      const weekKey = formatDate(weekStart);
      const settlementHistoryKey = `nyx_settlement_history_${weekKey}`;
      let settlementHistory = JSON.parse(localStorage.getItem(settlementHistoryKey) || '{}');

      const rHistory = settlementHistory[rid] || [];
      if (rHistory.length > 0) {
        // ── 删除本次结算自动产生的支出记录 ──────────────────────
        try {
          const settlementExpenseKey = `nyx_settlement_expenses_${weekKey}_${rid}_${rHistory.length}`;
          const savedIds = JSON.parse(localStorage.getItem(settlementExpenseKey) || '[]');
          for (const id of savedIds) {
            await DataStore.deleteExpense(id);
          }
          localStorage.removeItem(settlementExpenseKey);
        } catch (e) {
          console.warn('删除结算支出记录失败:', e);
        }
        // ────────────────────────────────────────────────────────────────

        rHistory.pop(); // 移除最后一次结算
        settlementHistory[rid] = rHistory;
        localStorage.setItem(settlementHistoryKey, JSON.stringify(settlementHistory));

        // 只有当前周才更新数据库（影响接待页面）
        if (isCurrentWeek) {
          const newLastDate = rHistory.length > 0 ? rHistory[rHistory.length - 1] : null;
          await DataStore.updateReceptionist(rid, { lastSettlementDate: newLastDate });

          if (rHistory.length === 0) {
            await DataStore.setSettled(rid, false);
          }
          alert(`↩️ ${receptionistName} 结算已撤销\n\n接待员页面余额将恢复。`);
        } else {
          // 过去周：只更新localStorage，不影响接待页面
          alert(`↩️ ${receptionistName} 历史结算记录已撤销\n\n（过去周操作不影响接待员页面）`);
        }
      }

      await refreshData();
      renderWeeklySettlement();
    }

    // 取消结算（从UI调用）
    async function undoSettlement(rid) {
      const receptionist = cachedData.receptionists.find(r => r.id === rid);
      const receptionistName = receptionist?.name || '该接待';

      if (confirm(`确定取消 ${receptionistName} 的结算状态吗？\n\n接待员页面余额将恢复到结算前状态。`)) {
        await undoLastSettlement(rid);
      }
    }

    // 周选择器
    let weekPickerMonth = new Date();

    function showWeekPicker() {
      weekPickerMonth = new Date();
      renderWeekPicker();
    }

    function renderWeekPicker() {
      const year = weekPickerMonth.getFullYear();
      const month = weekPickerMonth.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();

      let calendarHtml = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center;">';
      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

      weekdays.forEach(d => {
        calendarHtml += `<div style="font-size: 12px; color: var(--text-muted); padding: 8px 0;">${d}</div>`;
      });

      for (let i = 0; i < startWeekday; i++) {
        calendarHtml += '<div></div>';
      }

      const currentWeekStart = formatDate(getWeekStart());
      const selectedWeekStartStr = selectedSettlementWeek ? formatDate(new Date(selectedSettlementWeek)) : currentWeekStart;

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dateObj = new Date(dateStr);
        const dayWeekStart = getWeekStartForDate(dateObj);
        const dayWeekStartStr = formatDate(dayWeekStart);

        const isSelectedWeek = dayWeekStartStr === selectedWeekStartStr;
        const isCurrentWeek = dayWeekStartStr === currentWeekStart;
        const isToday = dateStr === getToday();

        calendarHtml += `
          <div onclick="selectWeek('${dayWeekStartStr}')" style="padding: 8px; cursor: pointer; border-radius: 8px; position: relative;
            ${isSelectedWeek ? 'background: var(--success); color: #fff; font-weight: bold;' : ''}
            ${isCurrentWeek && !isSelectedWeek ? 'background: rgba(16, 185, 129, 0.2);' : ''}
            ${isToday ? 'border: 2px solid var(--primary);' : ''}
            transition: background 0.2s;"

    function getWeekStartForDate(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      return new Date(d.setDate(diff));
    }

      function searchManageOrders() {
        const input = document.getElementById('manageOrderSearchInput').value.trim();
        const container = document.getElementById('manageOrderSearchResult');

        if (!input) {
          container.classList.add('hidden');
          return;
        }

        const orders = cachedData.orders;
        const receptionists = cachedData.receptionists;
        let resultsHtml = '';
        let hasMatch = false;

        // 1. 检查是否匹配老板名字
        const allBossNames = [...new Set(orders.map(o => o.bossName))];
        if (allBossNames.includes(input)) {
          hasMatch = true;
          const bossOrders = orders.filter(o => o.bossName === input);
          const normalCount = bossOrders.filter(o => o.type === 'normal').length;
          const monthlyCount = bossOrders.filter(o => o.type === 'monthly').length;
          const balance = getBossBalanceSync(input);

          const totalConsumption = bossOrders
            .reduce((sum, o) => {
              if (o.type === 'monthly') return sum + 9.9;
              if (['normal', 'gift', 'deduct_prepaid'].includes(o.type)) return sum + (o.amount || 0);
              return sum;
            }, 0);

          resultsHtml += `
      <div onclick = "setView('bossDetail', { name: '${input}' })" style = "background: transparent; border: 1px solid var(--border); padding: 16px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; margin-bottom: 12px;" >
               <div style="margin-bottom: 12px;">
                 <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 8px; color: var(--text);">🐯 老板：${input}</h3>
                 <p style="font-size: 14px; color: var(--text-muted);">共消费：正常单 ${normalCount} 单，月卡 ${monthlyCount} 单</p>
                 <p style="font-size: 14px; color: var(--text-muted);">余额：<span style="font-weight: bold; color: var(--accent); font-size: 16px;">¥${balance.toFixed(0)}</span></p>
                 <p style="font-size: 14px; color: var(--text-muted);">累计消费：¥${totalConsumption.toFixed(0)} <span style="font-size: 12px; opacity: 0.8;">（正常单，月卡，预存，礼物）</span></p>
               </div>
               <div style="text-align: right;">
                  <span class="btn btn-sm btn-primary" style="background: var(--primary); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px;">查看详细记录 ></span>
               </div>
             </div >
      `;
        }

        // 2. 检查是否匹配接待名字
        const matchedReceptionist = receptionists.find(r => r.name === input);
        if (matchedReceptionist) {
          hasMatch = true;
          const rOrders = orders.filter(o => o.receptionistId === matchedReceptionist.id);

          // 分类统计订单
          const normalCount = rOrders.filter(o => o.type === 'normal').length;
          const giftCount = rOrders.filter(o => o.type === 'gift').length;
          const monthlyCount = rOrders.filter(o => o.type === 'monthly').length;
          const prepaidCount = rOrders.filter(o => o.type === 'prepaid').length;
          const bonusCount = rOrders.filter(o => o.type === 'bonus').length;

          // 实际订单数（不含奖励）
          const actualOrderCount = normalCount + giftCount + monthlyCount + prepaidCount;

          // 计算累计流水（不含奖励和月卡单）
          const totalAmount = rOrders.reduce((sum, o) => {
            if (o.type === 'monthly') return sum + 9.9;
            if (['normal', 'gift', 'deduct_prepaid'].includes(o.type)) return sum + (o.amount || 0);
            return sum;
          }, 0);

          resultsHtml += `
      <div onclick = "setView('receptionistDetail', { id: '${matchedReceptionist.id}' })" style = "background: transparent; border: 1px solid var(--border); padding: 16px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; margin-bottom: 12px;" >
               <div style="margin-bottom: 12px;">
                 <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 8px; color: var(--text);">👤 接待：${matchedReceptionist.name}</h3>
                 <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">累计接单：<span style="font-weight: bold; color: var(--text);">${actualOrderCount}</span> 单</p>
                 <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">
                   正常单 ${normalCount} | 礼物单 ${giftCount} | 月卡单 ${monthlyCount} | 预存单 ${prepaidCount}
                 </p>
                 <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
                   🏆 奖励记录 ${bonusCount} 条（不计入单数）
                 </p>
                 <p style="font-size: 14px; color: var(--text-muted);">累计流水：<span style="font-weight: bold; color: var(--accent); font-size: 16px;">¥${totalAmount.toFixed(0)}</span></p>
               </div>
               <div style="text-align: right;">
                  <span class="btn btn-sm btn-primary" style="background: var(--primary); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px;">查看接待记录 ></span>
               </div>
             </div >
      `;
        }

        // 3. 检查是否匹配占卜师名字
        const allDiviners = [...new Set(orders.map(o => o.divinerId).filter(d => d && d !== '无'))];
        if (allDiviners.includes(input)) {
          hasMatch = true;
          const dOrders = orders.filter(o => o.divinerId === input);

          const totalIncome = dOrders.reduce((sum, o) => {
            if (o.type === 'monthly' || o.type === 'prepaid' || o.type === 'bonus') return sum;

            const amount = o.amount || 0;

            const rec = receptionists.find(r => r.id === o.receptionistId) || { commissionRate: 5 };
            const recComm = calculateCommission(o, rec);
            const stuComm = calculateStudioIncomeForOrder(o, recComm, cachedData.diviners || []);
            const divComm = amount - recComm - stuComm;
            return sum + divComm;
          }, 0);

          resultsHtml += `
      <div onclick = "setView('divinerDetail', { name: '${input}' })" style = "background: transparent; border: 1px solid var(--border); padding: 16px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; margin-bottom: 12px;" >
               <div style="margin-bottom: 12px;">
                 <h3 style="font-size: 18px; font-weight: bold; margin-bottom: 8px; color: var(--text);">🔮 占卜师：${input}</h3>
                 <p style="font-size: 14px; color: var(--text-muted);">累计占卜：${dOrders.length} 单</p>
                 <p style="font-size: 14px; color: var(--text-muted);">总共收入：<span style="font-weight: bold; color: var(--accent); font-size: 16px;">¥${totalIncome.toFixed(2)}</span></p>
               </div>
               <div style="text-align: right;">
                  <span class="btn btn-sm btn-primary" style="background: var(--primary); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px;">查看占卜记录 ></span>
               </div>
             </div >
      `;
        }

        // 如果有匹配的名片，显示它们
        if (hasMatch) {
          container.innerHTML = resultsHtml;
          container.classList.remove('hidden');
          return;
        }

        // 4. 否则执行原来的模糊搜索
        const inputLower = input.toLowerCase();

        const matches = orders.filter(o => {
          const typeName = getOrderTypeName(o.type);
          const content = `${o.bossName} ${typeName} ${o.divinerId || ''} ${o.questionContent || ''} ${o.amount} `.toLowerCase();
          return content.includes(inputLower);
        });

        if (matches.length === 0) {
          container.innerHTML = '<p class="text-muted text-center text-sm">未找到相关订单</p>';
        } else {
          // 按时间倒序
          matches.sort((a, b) => new Date(b.date) - new Date(a.date));

          container.innerHTML = matches.slice(0, 10).map(o => {
            const r = receptionists.find(rec => rec.id === o.receptionistId);
            const rName = r ? r.name : '未知';
            const typeColor = getOrderTypeColor(o.type);
            const typeName = getOrderTypeName(o.type);

            return `
      <div style = "background: var(--bg-card); border: 1px solid var(--border); padding: 8px; border-radius: 6px; margin-bottom: 8px;" >
                  <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px;">
                     <span style="font-weight: bold;">老板：${o.bossName}</span>
                     <div style="display: flex; align-items: center; gap: 8px;">
                       <span style="color: ${typeColor}; background: ${typeColor}15; padding: 1px 4px; border-radius: 4px;">${typeName}</span>
                       <button onclick="deleteSearchOrder(${o.id})" style="background: var(--danger); color: white; border: none; border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer;">删除</button>
                     </div>
                  </div>
                  <div style="font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 2px;">
                     <p>日期: ${formatDate(o.date)} | 接待: ${rName}</p>
                     ${o.type !== 'monthly' ? `<p>金额: ¥${o.amount}</p>` : ''}
                     ${o.divinerId && o.divinerId !== '无' ? `<p>占卜师: ${o.divinerId}</p>` : ''}
                     ${o.questionContent ? `<p>问题: ${o.questionContent}</p>` : ''}
                  </div>
                </div >

          }).join('');

    async function handleAddOrder(e) {
      e.preventDefault();

      // 防止重复提交
      if (isSubmitting) return;

      const rid = document.getElementById('manageReceptionist').value;
      const type = document.getElementById('addOrderType').value;
      const date = document.getElementById('addOrderDate').value;
      const bossName = document.getElementById('addOrderBoss').value;
      const paymentMethodEl = document.querySelector('input[name="addOrderPaymentMethod"]:checked');
      const paymentMethod = paymentMethodEl ? paymentMethodEl.value : 'wechat';

      if (!rid) {
        alert('请先选择接待');
        return;
      }

      // 显示加载弹窗
      showLoadingOverlay();

      try {
        if (type === 'monthly') {
          // 月卡单：根据数量批量创建
          const count = parseInt(document.getElementById('addOrderCount').value) || 1;
          for (let i = 0; i < count; i++) {
            await DataStore.saveOrder({
              receptionistId: rid,
              date: date,
              bossName: bossName + (count > 1 ? ` #${i + 1}` : ''),
              type: 'monthly',
              paymentMethod: paymentMethod,
              divinerId: '无',
              amount: 0,
              approved: true
            });
          }
          await refreshData();
          hideLoadingOverlay();
          closeAddOrderModal();
          alert('补录成功！共添加 ' + count + ' 个月卡单');
        } else {
          // 其他类型：单个创建
          const amount = parseFloat(document.getElementById('addOrderAmount').value) || 0;
          const questionContent = document.getElementById('addOrderQuestion')?.value?.trim() || '';
          const divinerId = document.getElementById('addOrderDiviner')?.value?.trim() || '';

          // 正常单和礼物单需要问题内容和占卜师
          if ((type === 'normal' || type === 'gift') && !questionContent) {
            hideLoadingOverlay();
            alert('正常单和礼物单需要填写问题内容');
            return;
          }
          if ((type === 'normal' || type === 'gift') && !divinerId) {
            hideLoadingOverlay();
            alert('正常单和礼物单需要填写占卜师');
            return;
          }

          await DataStore.saveOrder({
            receptionistId: rid,
            date: date,
            bossName: bossName,
            type: type,
            paymentMethod: paymentMethod,
            questionContent: (type === 'normal' || type === 'gift') ? questionContent : null,
            divinerId: (type === 'normal' || type === 'gift') ? divinerId : (type === 'prepaid' ? '无' : ''),
            amount: amount,
            approved: true
          });
          await refreshData();
          hideLoadingOverlay();
          closeAddOrderModal();
          alert('补录成功！');
        }
      } catch (err) {
        hideLoadingOverlay();
        console.error('补录订单失败:', err);
        alert('补录失败，请检查网络连接后重试');
      }
    }
