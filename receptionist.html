<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyx Studio - 接待员主页</title>
  <meta name="description" content="Nyx Studio 接待员工作台">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="bg-decoration"></div>
  <div class="stars-container"></div>

  <div class="main-content">
    <div class="container" id="pageContent">
      <div style="display: flex; justify-content: center; align-items: center; padding: 40px;">
        <div
          style="width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;">
        </div>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </div>

  <div id="announcementModal" class="modal-overlay hidden">
    <div class="card modal-content" style="max-width: 450px; max-height: 80vh; overflow-y: auto;">
      <div style="text-align: center;">
        <div style="font-size: 48px; margin-bottom: 16px;">📢</div>
        <h2 style="color: var(--accent); margin-bottom: 16px;">通知公告</h2>
      </div>
      <div id="announcementContent" style="margin-bottom: 20px;"></div>
      <button class="btn btn-accent btn-full" onclick="closeAnnouncement()">好滴！收到！</button>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script src="utils.js"></script>
  <script>
    let showBalanceDetail = false;
    let showPenalties = false;
    let unreadCount = 0;
    let cachedData = null;
    let showExtraTasks = false;

    const user = requireReceptionist();
    if (!user) {
      // 会自动跳转
    } else {
      initPage();
    }

    async function initPage() {
      await DataStore.evaluatePromotions(); // 独立打开前台也自动评估
      await loadData();
      renderPage();
    }

    async function loadData() {
      const [receptionists, orders, penalties, announcements] = await Promise.all([
        DataStore.getReceptionists(),
        DataStore.getOrders(),
        DataStore.getPenaltiesByReceptionist(user.id),
        DataStore.getAnnouncements()
      ]);

      const readAnnouncements = await DataStore.getReadAnnouncements(user.id);
      const currentReceptionist = receptionists.find(r => r.id === user.id) || user;
      const userOrders = orders.filter(o => o.receptionistId === user.id && o.approved !== false);

      // 获取被拒绝且未读的订单
      const dismissedRejections = JSON.parse(localStorage.getItem(`nyx_dismissed_rejections_${user.id}`) || '[]');
      const rejectedOrders = orders.filter(o =>
        o.receptionistId === user.id &&
        o.approved === false &&
        o.rejectionReason &&
        !dismissedRejections.includes(o.id)
      );

      cachedData = {
        receptionists,
        orders,
        userOrders,
        penalties,
        announcements,
        readAnnouncements,
        currentReceptionist,
        rejectedOrders
      };
    }

    function renderPage() {
      if (!cachedData) return;

      const { userOrders, penalties, announcements, readAnnouncements, currentReceptionist } = cachedData;

      // 计算未读通知数量（仅计算7天内展示的通知）
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      unreadCount = announcements.filter(a => new Date(a.createdAt) >= sevenDaysAgo && !readAnnouncements.includes(a.id)).length;

      // 结算逻辑 - 每周一自动重置
      const weekStartTime = getWeekStart().getTime();
      let lastSettlementTime = currentReceptionist.lastSettlementDate ? new Date(currentReceptionist.lastSettlementDate).getTime() : 0;

      // 如果上次结算在本周之前，强制视为本周开始时结算（每周一自动重置）
      if (lastSettlementTime < weekStartTime) {
        lastSettlementTime = weekStartTime;
      }

      const taskStartTime = lastSettlementTime;

      // 周期内订单（从上次结算后开始计算）
      const weeklyOrders = userOrders.filter(o => {
        const orderTime = new Date(o.createdAt).getTime();
        return orderTime > lastSettlementTime;
      });

      const weeklyMonthlyOrders = weeklyOrders.filter(o => o.type === 'monthly').length;
      const taskComplete = weeklyMonthlyOrders >= 3;

      const weeklyFlow = weeklyOrders
        .filter(o => o.type === 'normal' || o.type === 'prepaid' || o.type === 'gift')
        .reduce((sum, o) => sum + (o.amount || 0), 0);

      const weeklyPrepaid = weeklyOrders
        .filter(o => o.type === 'prepaid')
        .reduce((sum, o) => sum + (o.amount || 0), 0);

      // 计算任务奖励状态（初始全为false，calculateBalanceSync会在真正加钱时设为true）
      const taskBonusStatus = {
        weeklyFlowComplete: false,
        prepaidComplete: false,
        monthlyCardComplete: false
      };

      // 计算余额
      const balanceData = calculateBalanceSync(userOrders, penalties, currentReceptionist, taskComplete, taskBonusStatus);

      // 从 localStorage 获取 promotionChecks
      const promotionChecks = JSON.parse(localStorage.getItem(`nyx_promo_${user.id}`) || '[false,false,false,false]');

      let buffHtml = '';
      if (currentReceptionist.commissionExpiry && new Date(currentReceptionist.commissionExpiry) > new Date()) {
        const d = new Date(currentReceptionist.commissionExpiry);
        buffHtml = '<p style="color: var(--accent); font-size: 13px; margin-top: 4px;">✨ 提成buff增加中～' + (d.getMonth() + 1) + '月' + d.getDate() + '日结束</p>';
      }

      const title = currentReceptionist.title || '实习接待';
      const nowTime = new Date();
      const isChampion = currentReceptionist.isChampion && currentReceptionist.championExpiry && nowTime <= new Date(currentReceptionist.championExpiry);
      
      let titleClass = 'intern';
      if (title === '正式接待') titleClass = 'official';
      if (title === '高级接待') titleClass = 'senior';
      
      const badges = [`<span class="title-badge title-badge-${titleClass}" style="line-height: normal;">${title}</span>`];
      if (title !== '实习接待' && isChampion) {
        const diffMs = new Date(currentReceptionist.championExpiry) - nowTime;
        const remainDays = Math.max(0, Math.ceil(diffMs / (1000 * 60 * 60 * 24)));
        badges.push(`<span class="title-badge title-badge-champion" style="line-height: normal;">销冠</span>`);
        badges.push(`<span style="font-size: 11px; color: var(--accent); margin-left: 18px; line-height: normal;">剩余 ${remainDays} 天</span>`);
      }

      // 调试信息：显示上次结算时间
      const settlementDebug = currentReceptionist.lastSettlementDate
        ? '上次结算：' + new Date(currentReceptionist.lastSettlementDate).toLocaleString()
        : '未结算过';
      console.log('DEBUG - lastSettlementDate:', currentReceptionist.lastSettlementDate);
      console.log('DEBUG - lastSettlementTime:', lastSettlementTime);
      console.log('DEBUG - weeklyOrders count:', weeklyOrders.length);

      let html = '<div class="page-header">' +
        '<h1 class="page-title">🌙 Nyx Studio</h1>' +
        '<button class="btn-text" onclick="logout()">退出登录</button>' +
        '</div>' +
        '<p style="font-size: 10px; color: var(--text-muted); margin-bottom: 8px;">' + settlementDebug + '</p>' +
        '<div class="card mb-5">' +
        '<div class="user-card">' +
        '<div class="user-avatar ' + (isChampion ? 'user-avatar-champion' : '') + '">' +
        (isChampion ? '<span class="user-avatar-crown">👑</span><div class="user-avatar-wreath"><span class="wreath-item" style="--a:0deg">🌸</span><span class="wreath-item" style="--a:45deg">✨</span><span class="wreath-item" style="--a:90deg">🌼</span><span class="wreath-item" style="--a:135deg">🌿</span><span class="wreath-item" style="--a:180deg">🌸</span><span class="wreath-item" style="--a:225deg">✨</span><span class="wreath-item" style="--a:270deg">🌼</span><span class="wreath-item" style="--a:315deg">🌿</span></div>' : '') +
        user.emoji + '</div>' +
        '<div class="user-info">' +
        '<div class="user-name">' + user.name +
        '<button class="notification-bubble" onclick="showAnnouncement()">📢 通知' + (unreadCount > 0 ? '<span class="notification-dot"></span>' : '') + '</button>' +
        '</div><div class="title-badge-row">' + badges.join('') + '</div>' +
        (title === '实习接待' ? '<p class="user-role">正在实习期，加油中！！！</p>' : '') +
        buffHtml + '</div></div>';

      html += '<div class="balance-card ' + (balanceData.taskFailed ? 'balance-card-failed' : 'balance-card-normal') + '" onclick="toggleBalanceDetail()">' +
        '<div class="balance-label">' +
        '<span>当前余额</span>' +
        '<span class="text-xs">' + (showBalanceDetail ? '▲ 收起' : '▼ 点击查看明细') + '</span>' +
        '</div>' +
        '<p class="balance-amount ' + (balanceData.taskFailed ? 'balance-amount-failed' : 'balance-amount-normal') + '">¥' + balanceData.amount.toFixed(2) + '</p>';

      if (balanceData.taskFailed) {
        html += '<p style="color: var(--danger); font-size: 14px; margin-top: 12px;">本周任务未完成，所以这周没有底薪哦宝宝</p>';
      }

      if (showBalanceDetail && !balanceData.taskFailed) {
        // 过滤结算后的订单和惩罚
        const filteredOrders = userOrders.filter(o => new Date(o.createdAt).getTime() > lastSettlementTime);
        const filteredPenalties = penalties.filter(p => {
          const penaltyTime = p.createdAt ? new Date(p.createdAt).getTime() : new Date(p.date).getTime();
          return penaltyTime > lastSettlementTime;
        });
        html += renderBalanceDetail(filteredOrders, filteredPenalties, currentReceptionist, balanceData, taskComplete);
      }

      html += '</div></div>';

      // 订单被拒绝提示（小哭脸）
      const { rejectedOrders } = cachedData;
      if (rejectedOrders && rejectedOrders.length > 0) {
        html += `
          <div class="rejection-notice" onclick="showRejectionDetails()" style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; gap: 12px;">
            <span style="font-size: 28px;">😢</span>
            <div style="flex: 1;">
              <p style="color: var(--danger); font-size: 14px; font-weight: 600;">宝宝审核不通过TvT请查看原因哦</p>
              <p style="color: var(--text-muted); font-size: 12px;">${rejectedOrders.length}个订单被拒绝</p>
            </div>
            <span style="color: var(--text-muted);">▶</span>
          </div>
        `;
      }

      // 额外任务HTML（两种状态共用）
      var extraTasksHtml = '';
      // 任务1
      extraTasksHtml += '<div class="task-block"><p style="font-size: 14px; margin-bottom: 8px;">1️⃣ 周流水达到500</p>' +
        '<div class="flex items-center gap-3"><div class="progress-bar">' +
        '<div class="progress-fill ' + (weeklyFlow >= 500 ? 'progress-fill-success' : 'progress-fill-primary') + '" style="width: ' + Math.min(weeklyFlow / 500 * 100, 100) + '%"></div></div>' +
        '<span class="text-xs ' + (weeklyFlow >= 500 ? 'order-type-monthly' : 'text-muted') + '">' + Math.min(Math.round(weeklyFlow / 500 * 100), 100) + '%</span></div></div>';

      // 任务2
      extraTasksHtml += '<div class="task-block"><p style="font-size: 14px; margin-bottom: 8px;">2️⃣ 在任意平台发布宣传贴文4条</p><div class="flex gap-2 flex-wrap">';
      for (let i = 0; i < 4; i++) {
        extraTasksHtml += '<button class="task-check-btn" style="border: 2px solid ' + (promotionChecks[i] ? 'var(--success)' : 'var(--border)') + '; background: ' + (promotionChecks[i] ? 'rgba(16,185,129,0.2)' : 'transparent') + '; color: ' + (promotionChecks[i] ? 'var(--success)' : 'var(--text-muted)') + ';" onclick="togglePromotionCheck(' + i + ')">' + (promotionChecks[i] ? '✓' : (i + 1)) + '</button>';
      }
      extraTasksHtml += '<span class="text-xs ' + (promotionChecks.filter(Boolean).length >= 4 ? 'order-type-monthly' : 'text-muted') + '" style="align-self: center; margin-left: 8px;">' + promotionChecks.filter(Boolean).length + '/4</span></div></div>';

      // 任务3
      extraTasksHtml += '<div class="task-block"><p style="font-size: 14px; margin-bottom: 8px;">3️⃣ 老板预存666</p>' +
        '<div class="flex items-center gap-3"><div class="progress-bar">' +
        '<div class="progress-fill ' + (weeklyPrepaid >= 666 ? 'progress-fill-success' : 'progress-fill-warning') + '" style="width: ' + Math.min(weeklyPrepaid / 666 * 100, 100) + '%"></div></div>' +
        '<span class="text-xs ' + (weeklyPrepaid >= 666 ? 'order-type-monthly' : 'text-muted') + '">' + Math.min(Math.round(weeklyPrepaid / 666 * 100), 100) + '%</span></div></div>';

      // 任务4
      extraTasksHtml += '<div class="task-block" style="margin-bottom: 0;"><p style="font-size: 14px; margin-bottom: 8px;">4️⃣ 拉到下单月卡老板9名</p>' +
        '<div class="flex items-center gap-3"><div class="progress-bar">' +
        '<div class="progress-fill ' + (weeklyMonthlyOrders >= 9 ? 'progress-fill-success' : 'progress-fill-primary') + '" style="width: ' + Math.min(weeklyMonthlyOrders / 9 * 100, 100) + '%"></div></div>' +
        '<span class="text-xs ' + (weeklyMonthlyOrders >= 9 ? 'order-type-monthly' : 'text-muted') + '">' + weeklyMonthlyOrders + '/9</span></div></div>';

      // 周任务进度
      html += '<div class="card mb-5">';
      if (!taskComplete) {
        html += '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">' +
          '<h3 style="font-size: 16px; margin: 0;">📋 本周任务</h3>' +
          '<button class="btn" style="font-size: 12px; padding: 4px 12px; border-radius: 8px; background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border);" onclick="toggleExtraTasks()">其他任务 ' + (showExtraTasks ? '▲' : '▼') + '</button>' +
          '</div>' +
          '<div class="flex items-center gap-3 mb-2">' +
          '<div class="progress-bar"><div class="progress-fill progress-fill-warning" style="width: ' + Math.min(weeklyMonthlyOrders / 3 * 100, 100) + '%"></div></div>' +
          '<span class="text-sm text-muted">' + weeklyMonthlyOrders + '/3 月卡单</span>' +
          '</div>' +
          '<p style="font-size: 13px; color: var(--danger);">⚠️ 未完成任务将导致本周无底薪</p>';

        if (showExtraTasks) {
          html += '<div style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);">' +
            '<p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">✨ 额外任务进度</p>' +
            extraTasksHtml + '</div>';
        }
      } else {
        html += '<h3 style="font-size: 16px; margin-bottom: 8px; color: var(--success);">🎉 周任务已完成 太棒啦宝宝!</h3>';
        html += '<p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">解锁任务后有超简单的任务 加油啊！！！</p>';
        html += extraTasksHtml;
      }
      html += '</div>';

      html += renderPenaltiesSection(penalties);

      html += '<div class="flex flex-col gap-3">' +
        '<button class="btn btn-accent btn-full" onclick="navigateTo(\'submit-order.html\')">📝 提交订单</button>' +
        '<button class="btn btn-secondary btn-full" onclick="navigateTo(\'view-records.html\')">📅 查看我的提交记录</button>' +
        '</div>';

      // 最近提交记录（可展开）
      html += '<div class="card" style="margin-top: 20px;">' +
        '<div style="display: flex; justify-content: space-between; align-items: center; cursor: pointer;" onclick="toggleRecentHistory()">' +
        '<h3 style="font-size: 15px; margin: 0;">📋 最近提交记录</h3>' +
        '<span style="color: var(--text-muted); font-size: 13px;" id="historyToggleIcon">' + (showRecentHistory ? '▲ 收起' : '▼ 展开') + '</span>' +
        '</div>';

      if (showRecentHistory) {
        html += renderRecentHistory();
      }

      html += '</div>';

      document.getElementById('pageContent').innerHTML = html;
    }

    let showRecentHistory = false;

    function toggleRecentHistory() {
      showRecentHistory = !showRecentHistory;
      renderPage();
    }

    function renderRecentHistory() {
      if (!cachedData) return '';

      const myOrders = cachedData.orders
        .filter(o => o.receptionistId === user.id)
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .slice(0, 10);

      if (myOrders.length === 0) {
        return '<p style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 12px 0;">暂无提交记录</p>';
      }

      let html = '<div style="margin-top: 14px;">';
      myOrders.forEach(function(order) {
        let statusBadge = '';
        let borderColor = 'var(--border)';
        if (order.approved === true) {
          statusBadge = '<span style="background: rgba(16,185,129,0.15); color: var(--success); font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;">✅ 已通过</span>';
          borderColor = 'var(--success)';
        } else if (order.approved === false && order.rejectionReason) {
          statusBadge = '<span style="background: rgba(239,68,68,0.15); color: var(--danger); font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;">❌ 未通过</span>';
          borderColor = 'var(--danger)';
        } else {
          statusBadge = '<span style="background: rgba(245,158,11,0.15); color: var(--warning); font-size: 11px; padding: 2px 8px; border-radius: 6px; font-weight: 600;">⏳ 正在审核</span>';
          borderColor = 'var(--warning)';
        }

        var typeName = getOrderTypeName(order.type);
        var typeColor = getOrderTypeColor(order.type);
        var amountText = order.type === 'monthly' ? '' : '¥' + (order.amount || 0).toFixed(2);

        // 占卜师和问题内容
        var divinerText = order.divinerId && order.divinerId !== '无' ? order.divinerId : '';
        var questionText = order.questionContent || '';

        html += '<div style="padding: 10px 12px; border-radius: 10px; background: var(--bg-light); margin-bottom: 8px; border-left: 3px solid ' + borderColor + ';">' +
          '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">' +
          '<span style="font-size: 13px; font-weight: 500;">' + order.bossName + ' <span style="color: ' + typeColor + '; font-size: 12px;">' + typeName + '</span></span>' +
          statusBadge +
          '</div>' +
          (divinerText ? '<p style="font-size: 12px; color: var(--text-muted); margin-bottom: 2px;">🔮 占卜师：' + divinerText + '</p>' : '') +
          (questionText ? '<p style="font-size: 12px; color: var(--text-muted); margin-bottom: 2px;">💬 ' + questionText + '</p>' : '') +
          '<div style="display: flex; justify-content: space-between; align-items: center;">' +
          '<span style="font-size: 12px; color: var(--text-muted);">' + order.date + '</span>' +
          '<span style="font-size: 13px; font-weight: 600; color: var(--accent);">' + amountText + '</span>' +
          '</div>' +
          (order.approved === false && order.rejectionReason ? '<p style="font-size: 12px; color: var(--danger); margin-top: 4px;">拒绝原因：' + order.rejectionReason + '</p>' : '') +
          '</div>';
      });
      html += '</div>';
      return html;
    }

    function calculateBalanceSync(orders, penalties, receptionist, taskComplete, taskBonusStatus = {}) {
      const weekStartTime = getWeekStart().getTime();
      let lastSettlementTime = receptionist.lastSettlementDate ? new Date(receptionist.lastSettlementDate).getTime() : 0;

      // 每周一自动重置：如果上次结算在本周之前，强制视为本周开始时结算
      if (lastSettlementTime < weekStartTime) {
        lastSettlementTime = weekStartTime;
      }

      // 1. 本周所有订单（从周一开始）
      const weeklyOrders = orders.filter(o =>
        o.approved !== false &&
        new Date(o.createdAt).getTime() >= weekStartTime
      );

      // 上次结算前的订单
      const previousOrders = weeklyOrders.filter(o =>
        new Date(o.createdAt).getTime() <= lastSettlementTime
      );

      // 本次待结算订单
      const currentOrders = weeklyOrders.filter(o =>
        new Date(o.createdAt).getTime() > lastSettlementTime
      );

      // 2. 判断提成比例（基于周总正单数）
      const weeklyNormalCount = weeklyOrders.filter(o => o.type === 'normal').length;
      const normalRateOverride = weeklyNormalCount > 5 ? 10 : 5;

      // 3. 计算余额
      let balance = 0;
      currentOrders.forEach(order => {
        if (order.type === 'bonus') {
          balance += order.amount;
        } else if (order.type !== 'monthly') {
          balance += calculateCommission(order, receptionist, normalRateOverride);
        }
      });

      // 4. 判断任务奖励（仅在跨过门槛时发放）
      // 底薪
      const prevMonthly = previousOrders.filter(o => o.type === 'monthly').length;
      const totalMonthly = weeklyOrders.filter(o => o.type === 'monthly').length;
      const baseSalary = getReceptionistBaseSalary(receptionist);
      if (totalMonthly >= 3 && prevMonthly < 3) {
        balance += baseSalary;
      }

      // 额外奖励（里程碑任务，独立于强制任务）
      if (taskBonusStatus) {
        // 周流水 500
        const getFlow = (os) => os.reduce((s, o) => s + (o.type === 'monthly' ? 9.9 : (o.type === 'bonus' ? 0 : (o.amount || 0))), 0);
        if (getFlow(weeklyOrders) >= 500 && getFlow(previousOrders) < 500) {
          balance += 15;
          taskBonusStatus.weeklyFlowComplete = true;
        }
        // 预存 666
        const getPrepaid = (os) => os.filter(o => o.type === 'prepaid').reduce((s, o) => s + (o.amount || 0), 0);
        if (getPrepaid(weeklyOrders) >= 666 && getPrepaid(previousOrders) < 666) {
          balance += 15;
          taskBonusStatus.prepaidComplete = true;
        }
        // 9个月卡
        if (totalMonthly >= 9 && prevMonthly < 9) {
          balance += 15;
          taskBonusStatus.monthlyCardComplete = true;
        }
      }

      // 减去惩罚
      penalties.forEach(p => {
        const penaltyTime = p.createdAt ? new Date(p.createdAt).getTime() : new Date(p.date).getTime();
        if (penaltyTime > lastSettlementTime) {
          balance -= p.amount;
        }
      });

      return { amount: Math.round(balance * 100) / 100, taskFailed: isAfterSundayDeadline() && !taskComplete, taskBonusStatus };
    }

    function renderBalanceDetail(orders, penalties, receptionist, balanceData, taskComplete) {
      let html = '<div class="balance-detail" onclick="event.stopPropagation()">' +
        '<h4 style="font-size: 14px; margin-bottom: 12px; color: var(--text);">💰 余额来源明细</h4>';

      if (taskComplete) {
        html += '<div class="balance-detail-item"><span class="balance-detail-label">🎯 底薪（' + getReceptionistTitleLabel(receptionist) + '）</span>' +
          '<span style="color: var(--success); font-weight: 600;">+¥' + getReceptionistBaseSalary(receptionist).toFixed(2) + '</span></div>';
      }

      // 里程碑任务奖金（有完成的就显示）
      if (balanceData.taskBonusStatus) {
        if (balanceData.taskBonusStatus.weeklyFlowComplete) {
          html += '<div class="balance-detail-item"><span class="balance-detail-label">🏆 任务奖金（周流水500）</span>' +
            '<span style="color: var(--success); font-weight: 600;">+¥15.00</span></div>';
        }
        if (balanceData.taskBonusStatus.prepaidComplete) {
          html += '<div class="balance-detail-item"><span class="balance-detail-label">🏆 任务奖金（预存666）</span>' +
            '<span style="color: var(--success); font-weight: 600;">+¥15.00</span></div>';
        }
        if (balanceData.taskBonusStatus.monthlyCardComplete) {
          html += '<div class="balance-detail-item"><span class="balance-detail-label">🏆 任务奖金（月卡9单）</span>' +
            '<span style="color: var(--success); font-weight: 600;">+¥15.00</span></div>';
        }
      }

      // 统计正单数量用于明细展示
      const normalOrderCount = orders.filter(o => o.type === 'normal').length;
      const normalRateOverride = normalOrderCount > 5 ? 10 : 5;

      orders.forEach(function (order) {
        if (order.type === 'bonus') {
          html += '<div class="balance-detail-item"><span class="balance-detail-label">🎉 奖金</span>' +
            '<span style="color: var(--bonus); font-weight: 600;">+¥' + order.amount.toFixed(2) + '</span></div>';
        } else if (order.type !== 'monthly') {
          var commission = calculateCommission(order, receptionist, normalRateOverride);
          var icons = { normal: '📦', gift: '🎁', prepaid: '💳', deduct_prepaid: '🪙' };
          html += '<div class="balance-detail-item"><span class="balance-detail-label">' + (icons[order.type] || '📦') + ' ' + getOrderTypeName(order.type) + '</span>' +
            '<span style="color: ' + getOrderTypeColor(order.type) + '; font-weight: 600;">+¥' + commission.toFixed(2) + '</span></div>';
        }
      });

      penalties.forEach(function (penalty) {
        html += '<div class="balance-detail-item"><span class="balance-detail-label">⚠️ 惩罚</span>' +
          '<span style="color: var(--danger); font-weight: 600;">-¥' + penalty.amount.toFixed(2) + '</span></div>';
      });

      html += '<div class="balance-detail-total"><span>💰 总计</span>' +
        '<span style="color: var(--accent);">¥' + balanceData.amount.toFixed(2) + '</span></div></div>';

      return html;
    }

    function renderPenaltiesSection(penalties) {
      if (penalties.length === 0) return '';

      var html = '<div class="card mb-5" style="border-color: var(--danger);">' +
        '<button class="btn-text" style="width: 100%; text-align: left; padding: 0;" onclick="togglePenalties()">' +
        '<div class="flex justify-between items-center">' +
        '<p style="color: var(--danger); font-size: 14px;">⚠️ 有 ' + penalties.length + ' 条惩罚记录（点击查看）</p>' +
        '<span style="color: var(--danger);">' + (showPenalties ? '▲' : '▼') + '</span></div></button>';

      if (showPenalties) {
        html += '<div style="margin-top: 12px;">';
        penalties.forEach(function (penalty) {
          html += '<div style="padding: 12px; border-radius: 8px; background: rgba(239,68,68,0.1); margin-bottom: 8px;">' +
            '<div class="flex justify-between mb-1"><span style="color: var(--danger); font-weight: 600;">-¥' + penalty.amount + '</span>' +
            '<span class="text-xs text-muted">' + penalty.date + '</span></div>' +
            '<p class="text-sm">原因：' + penalty.reason + '</p></div>';
        });
        html += '</div>';
      }

      html += '</div>';
      return html;
    }

    function toggleBalanceDetail() {
      showBalanceDetail = !showBalanceDetail;
      renderPage();
    }

    function togglePenalties() {
      showPenalties = !showPenalties;
      renderPage();
    }

    function toggleExtraTasks() {
      showExtraTasks = !showExtraTasks;
      renderPage();
    }

    function togglePromotionCheck(index) {
      var checks = JSON.parse(localStorage.getItem(`nyx_promo_${user.id}`) || '[false,false,false,false]');
      checks[index] = !checks[index];
      localStorage.setItem(`nyx_promo_${user.id}`, JSON.stringify(checks));
      renderPage();
    }

    // 显示拒绝详情弹窗
    function showRejectionDetails() {
      const rejectedOrders = cachedData.rejectedOrders || [];
      if (rejectedOrders.length === 0) return;

      let detailHtml = '<div style="max-height: 60vh; overflow-y: auto;">';
      rejectedOrders.forEach((order, index) => {
        const typeName = order.type === 'normal' ? '正常单' :
          order.type === 'monthly' ? '月卡单' :
            order.type === 'prepaid' ? '预存单' :
              order.type === 'gift' ? '礼物单' : order.type;
        detailHtml += `
          <div style="background: var(--bg-light); border-radius: 8px; padding: 12px; margin-bottom: 12px;">
            <p style="font-size: 14px; margin-bottom: 6px;"><strong>订单 ${index + 1}:</strong> ${order.bossName} - ${typeName}</p>
            <p style="font-size: 13px; color: var(--danger);"><strong>拒绝原因：</strong>${order.rejectionReason}</p>
            <p style="font-size: 12px; color: var(--text-muted);">日期：${order.date}</p>
          </div>
        `;
      });
      detailHtml += '</div>';

      // 创建弹窗
      const modal = document.createElement('div');
      modal.id = 'rejectionModal';
      modal.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;';
      modal.innerHTML = `
        <div style="background: var(--bg-card); border-radius: 16px; padding: 24px; max-width: 400px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.3);">
          <h3 style="font-size: 18px; margin-bottom: 16px; text-align: center;">😢 订单审核未通过</h3>
          ${detailHtml}
          <button onclick="dismissRejections()" style="width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-top: 12px;">我知道鸟～</button>
        </div>
      `;
      document.body.appendChild(modal);
    }

    // 关闭拒绝提示（永久dismisss）
    function dismissRejections() {
      const rejectedOrders = cachedData.rejectedOrders || [];
      const dismissedIds = rejectedOrders.map(o => o.id);

      // 保存到 localStorage
      const existingDismissed = JSON.parse(localStorage.getItem(`nyx_dismissed_rejections_${user.id}`) || '[]');
      const newDismissed = [...new Set([...existingDismissed, ...dismissedIds])];
      localStorage.setItem(`nyx_dismissed_rejections_${user.id}`, JSON.stringify(newDismissed));

      // 关闭弹窗并刷新
      const modal = document.getElementById('rejectionModal');
      if (modal) modal.remove();

      // 更新 cachedData 并重新渲染
      cachedData.rejectedOrders = [];
      renderPage();
    }

    async function showAnnouncement() {
      var announcements = cachedData.announcements;
      var readAnnouncements = cachedData.readAnnouncements;

      // 过滤7天内的公告
      var sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
      var recentAnnouncements = announcements.filter(function (a) {
        return new Date(a.createdAt) >= sevenDaysAgo;
      }).sort(function (a, b) {
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      var html = '';
      if (recentAnnouncements.length === 0) {
        html = '<p class="text-muted text-center" style="padding: 20px;">暂无通知</p>';
      } else {
        recentAnnouncements.forEach(function (a, index) {
          var isUnread = !readAnnouncements.includes(a.id);
          var isLatest = index === 0;
          html += '<div style="padding: 12px; border-radius: 10px; background: var(--bg-light); margin-bottom: 12px; border-left: 4px solid ' + (isUnread ? 'var(--accent)' : 'var(--border)') + '; position: relative;">';
          html += '<div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">';
          html += '<div>';
          if (isUnread) {
            html += '<span style="display: inline-block; background: var(--accent); color: var(--bg); font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 6px;">NEW</span>';
          }
          html += '</div>';
          if (isLatest) {
            html += '<span style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap;">✨ 最新通知</span>';
          }
          html += '</div>';
          html += '<p style="font-size: 14px; line-height: 1.6;">' + a.content + '</p>';
          html += '<p class="text-xs text-muted" style="margin-top: 8px;">' + new Date(a.createdAt).toLocaleString() + '</p>';
          html += '</div>';
        });
      }

      document.getElementById('announcementContent').innerHTML = html;
      document.getElementById('announcementModal').classList.remove('hidden');
    }

    async function closeAnnouncement() {
      // 标记所有7天内的公告为已读
      var announcements = cachedData.announcements;
      var sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

      for (const a of announcements) {
        if (new Date(a.createdAt) >= sevenDaysAgo) {
          await DataStore.markAnnouncementRead(user.id, a.id);
        }
      }

      document.getElementById('announcementModal').classList.add('hidden');
      await loadData();
      renderPage();
    }
  </script>
</body>

</html>
