<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx Studio - 提交订单</title>
    <meta name="description" content="Nyx Studio 提交订单">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration"></div>
    <div class="stars-container"></div>

    <!-- 主内容 -->
    <div class="main-content">
        <div class="container" id="pageContent">
            <!-- 内容将通过JS加载 -->
        </div>
    </div>

    <!-- 成功弹窗 -->
    <div id="successModal" class="modal-overlay hidden">
        <div class="card modal-content text-center" style="padding: 40px;">
            <div style="font-size: 64px; margin-bottom: 16px;">✨</div>
            <h2 style="color: var(--success); margin-bottom: 8px;">提交成功！</h2>
            <p class="text-muted">订单已提交，等待审核中～</p>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
    <script>
        let cachedOrders = [];
        let cachedDiviners = [];

        // 检查登录状态
        const user = requireReceptionist();
        if (!user) {
            // 会自动跳转
        } else {
            initPage();
        }

        async function initPage() {
            // 预加载订单数据用于验证
            const [orders, diviners] = await Promise.all([
                DataStore.getOrders(),
                DataStore.getDiviners().catch(() => [])
            ]);
            cachedOrders = orders;
            cachedDiviners = [{ name: '虎虎' }, ...diviners.filter(d => d.name !== '虎虎')];
            renderPage();
        }

        function renderPage() {
            const html = `
        <div class="back-header">
          <button class="back-button" onclick="navigateTo('receptionist.html')">←</button>
          <h1 class="page-title">📝 提交订单</h1>
        </div>
        
        <div class="card">
          <form id="orderForm">
            <div class="form-group">
              <label class="form-label">日期</label>
              <input type="date" id="orderDate" class="form-input" value="${getToday()}" required>
              <p class="form-hint">请确定好日期是否正确哦宝宝～</p>
            </div>
            
            <div class="form-group">
              <label class="form-label">接待名称</label>
              <input type="text" class="form-input form-input-readonly" value="${user.emoji} ${user.name}" disabled>
            </div>
            
            <div class="form-group">
              <label class="form-label">老板名称</label>
              <input type="text" id="bossName" class="form-input" placeholder="请输入老板名称" required>
              <p id="bossNameError" class="form-hint" style="color: var(--danger); display: none;">没搜索到对应名字哦。。。联系管理询问正确后台名字quq</p>
            </div>
            
            <div class="form-group">
              <label class="form-label">单子类型</label>
              <select id="orderType" class="form-select" onchange="onOrderTypeChange()">
                <option value="normal">正常单</option>
                <option value="gift">礼物单</option>
                <option value="monthly">月卡单</option>
                <option value="prepaid">预存单</option>
                <option value="deduct_prepaid">扣除存单</option>
              </select>
            </div>
            
            <div class="form-group" id="divinerGroup">
              <label class="form-label">占卜师名称</label>
              <select id="divinerId" class="form-select">
                <option value="">请选择占卜师</option>
                ${cachedDiviners.map(d => `<option value="${d.name}">${d.name}</option>`).join('')}
              </select>
            </div>
            
            <div class="form-group" id="questionGroup">
              <label class="form-label">问题内容</label>
              <input type="text" id="questionContent" class="form-input" placeholder="请简单描述占卜内容">
            </div>
            
            <div class="form-group" id="amountGroup">
              <label class="form-label">金额</label>
              <input type="number" id="amount" class="form-input" placeholder="请输入金额" step="0.01">
              <p class="form-hint" id="amountHint">允许金额：${allowedNormalAmounts.slice().sort((a, b) => a - b).join('、')}</p>
            </div>

            <div class="form-group" id="paymentMethodGroup">
              <label class="form-label">收款方式</label>
              <div class="payment-method-group" id="paymentMethodOptions">
                <label class="payment-method-option" id="wechatOption">
                  <input type="radio" name="paymentMethod" value="wechat">
                  <span>微信</span>
                </label>
                <label class="payment-method-option" id="alipayOption">
                  <input type="radio" name="paymentMethod" value="alipay">
                  <span>支付宝</span>
                </label>
              </div>
              <p class="form-hint">必须选择其中一个哦宝宝～</p>
            </div>
            
            <div class="form-group hidden" id="discountGroup">
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                <input type="checkbox" id="hasDiscount" style="width: 18px; height: 18px; accent-color: var(--accent);" onchange="onDiscountToggle()">
                <label for="hasDiscount" style="cursor: pointer; font-size: 14px;">有折扣</label>
              </div>
              <div id="discountInputWrapper" class="hidden" style="display: flex; align-items: center; gap: 8px;">
                <input type="number" id="discountValue" class="form-input" placeholder="如：9、8.5、8" step="0.1" min="1" max="9.9" style="width: 100px;">
                <span style="font-size: 14px; color: var(--text-muted);">折</span>
                <span id="discountPreview" style="font-size: 12px; color: var(--accent); margin-left: 10px;"></span>
              </div>
            </div>
            
            <div class="form-group hidden" id="monthlyAmountGroup">
              <label class="form-label">金额</label>
              <div class="form-input form-input-readonly">无</div>
            </div>
            
            <div id="errorMessage" class="error-message hidden"></div>
            
            <button type="submit" id="submitBtn" class="btn btn-accent btn-full">确认提交</button>
          </form>
        </div>
      `;

            document.getElementById('pageContent').innerHTML = html;
            onOrderTypeChange();
        }

        function onOrderTypeChange() {
            const orderType = document.getElementById('orderType').value;
            const isMonthly = orderType === 'monthly';
            const isPrepaid = orderType === 'prepaid';
            const isDeductPrepaid = orderType === 'deduct_prepaid';
            const isNormal = orderType === 'normal';

            // 占卜师名称 
            const divinerGroup = document.getElementById('divinerGroup');
            const divinerId = document.getElementById('divinerId');
            if (isMonthly || isPrepaid) {
                divinerGroup.style.display = 'none';
                divinerId.value = '无';
            } else {
                divinerGroup.style.display = 'block';
                if (divinerId.value === '无') divinerId.value = '';
            }

            // 问题内容
            const questionGroup = document.getElementById('questionGroup');
            if (isMonthly || isPrepaid) {
                questionGroup.style.display = 'none';
            } else {
                questionGroup.style.display = 'block';
            }

            // 金额
            const amountGroup = document.getElementById('amountGroup');
            const monthlyAmountGroup = document.getElementById('monthlyAmountGroup');
            const amountHint = document.getElementById('amountHint');

            if (isMonthly) {
                amountGroup.style.display = 'none';
                monthlyAmountGroup.style.display = 'block';
            } else {
                amountGroup.style.display = 'block';
                monthlyAmountGroup.style.display = 'none';

                if (isNormal) {
                    amountHint.innerHTML = `允许金额：${allowedNormalAmounts.slice().sort((a, b) => a - b).join('、')}`;
                    amountHint.style.display = 'block';
                } else if (isDeductPrepaid) {
                    amountHint.innerHTML = `允许金额：${allowedDeductAmounts.slice().sort((a, b) => a - b).join('、')}`;
                    amountHint.style.display = 'block';
                } else {
                    amountHint.style.display = 'none';
                }
            }

            // 折扣选项只在正常单时显示
            const discountGroup = document.getElementById('discountGroup');
            if (isNormal) {
                discountGroup.classList.remove('hidden');
            } else {
                discountGroup.classList.add('hidden');
                document.getElementById('hasDiscount').checked = false;
                document.getElementById('discountInputWrapper').classList.add('hidden');
            }

            handlePaymentMethodLock();
        }

        // 折扣开关切换
        function onDiscountToggle() {
            const hasDiscount = document.getElementById('hasDiscount').checked;
            const wrapper = document.getElementById('discountInputWrapper');
            if (hasDiscount) {
                wrapper.classList.remove('hidden');
                wrapper.style.display = 'flex';
            } else {
                wrapper.classList.add('hidden');
                wrapper.style.display = 'none';
                document.getElementById('discountValue').value = '';
                document.getElementById('discountPreview').textContent = '';
            }
        }

        // 金额输入时更新折扣预览，以及老板名字输入时更新支付方式锁定
        document.getElementById('pageContent').addEventListener('input', function (e) {
            if (e.target.id === 'amount' || e.target.id === 'discountValue') {
                updateDiscountPreview();
            }
            if (e.target.id === 'bossName') {
                handlePaymentMethodLock();
            }
        });

        function handlePaymentMethodLock() {
            const orderType = document.getElementById('orderType')?.value;
            const bossName = document.getElementById('bossName')?.value.trim();
            const wechatOption = document.querySelector('input[name="paymentMethod"][value="wechat"]');
            const alipayOption = document.querySelector('input[name="paymentMethod"][value="alipay"]');
            const paymentMethodGroup = document.getElementById('paymentMethodGroup');
            const bossNameError = document.getElementById('bossNameError');
            if(!wechatOption || !alipayOption || !paymentMethodGroup) return;
            
            // 先解除锁定状态
            wechatOption.disabled = false;
            alipayOption.disabled = false;
            paymentMethodGroup.style.opacity = '1';
            const hintElement = paymentMethodGroup.querySelector('.form-hint');
            
            if (orderType === 'deduct_prepaid' && bossName) {
                // 找到该老板最新的已审核的存单
                const bossPrepaidOrders = cachedOrders.filter(o => 
                    o.bossName === bossName && 
                    o.type === 'prepaid' && 
                    o.approved === true
                ).sort((a, b) => new Date(b.date) - new Date(a.date));
                
                if (bossPrepaidOrders.length > 0) {
                    if (bossNameError) bossNameError.style.display = 'none';
                    const originalMethod = bossPrepaidOrders[0].paymentMethod || 'wechat';
                    if (originalMethod === 'wechat') {
                        wechatOption.checked = true;
                    } else if (originalMethod === 'alipay') {
                        alipayOption.checked = true;
                    }
                    
                    // 锁定不能修改
                    wechatOption.disabled = true;
                    alipayOption.disabled = true;
                    paymentMethodGroup.style.opacity = '0.7';
                    
                    if(hintElement) {
                        hintElement.innerHTML = `已锁定为预存的付款方式啦～`;
                        hintElement.style.color = 'var(--accent)';
                    }
                } else {
                    if (bossNameError) bossNameError.style.display = 'block';
                    if(hintElement) {
                         hintElement.innerHTML = `必须选择其中一个哦宝宝～`;
                         hintElement.style.color = '';
                    }
                }
            } else {
                if (bossNameError) bossNameError.style.display = 'none';
                if(hintElement) {
                    hintElement.innerHTML = `必须选择其中一个哦宝宝～`;
                    hintElement.style.color = '';
                }
            }
        }

        function updateDiscountPreview() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const discountValue = parseFloat(document.getElementById('discountValue').value) || 0;
            const preview = document.getElementById('discountPreview');

            if (amount > 0 && discountValue > 0 && discountValue < 10) {
                const discountedAmount = amount * discountValue / 10;
                const floorAmount = Math.floor(discountedAmount);  // 抹除小数
                preview.innerHTML = `折后: ¥${discountedAmount.toFixed(2)} → <strong style="color: var(--success);">实收 ¥${floorAmount}</strong>`;
            } else {
                preview.textContent = '';
            }
        }

        function clearFieldError(id) {
            const el = document.getElementById(id);
            if (el) el.classList.remove('field-error');
        }

        document.getElementById('pageContent').addEventListener('change', function (e) {
            if (e.target.name === 'paymentMethod') {
                document.getElementById('paymentMethodOptions').classList.remove('field-error');
                document.getElementById('wechatOption').classList.remove('field-error');
                document.getElementById('alipayOption').classList.remove('field-error');
            }
        });

        // 同步计算老板余额（只计算已通过审核的订单）
        function getBossBalanceFromCache(bossName) {
            const bossOrders = cachedOrders.filter(o => o.bossName === bossName && o.approved === true);
            const totalPrepaid = bossOrders.filter(o => o.type === 'prepaid').reduce((sum, o) => sum + (o.amount || 0), 0);
            const totalDeducted = bossOrders.filter(o => o.type === 'deduct_prepaid').reduce((sum, o) => sum + (o.amount || 0), 0);
            return totalPrepaid - totalDeducted;
        }

        // 检查老板是否在系统中
        function isBossInSystemSync(bossName) {
            return cachedOrders.some(o => o.type === 'prepaid' && o.bossName === bossName);
        }

        document.getElementById('pageContent').addEventListener('submit', async function (e) {
            if (e.target.id === 'orderForm') {
                e.preventDefault();

                const orderType = document.getElementById('orderType').value;
                const bossName = document.getElementById('bossName').value.trim();
                const amount = document.getElementById('amount').value;
                const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value;
                const errorDiv = document.getElementById('errorMessage');
                const submitBtn = document.getElementById('submitBtn');

                ['bossName', 'amount', 'divinerId', 'questionContent'].forEach(clearFieldError);
                document.getElementById('paymentMethodOptions').classList.remove('field-error');
                document.getElementById('wechatOption').classList.remove('field-error');
                document.getElementById('alipayOption').classList.remove('field-error');

                // 验证
                if (!bossName) {
                    document.getElementById('bossName').classList.add('field-error');
                    errorDiv.textContent = '补药走，还没有填写完整呢(｡•́︿•̀｡)';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                if (orderType !== 'monthly' && !amount) {
                    document.getElementById('amount').classList.add('field-error');
                    errorDiv.textContent = '补药走，还没有填写完整呢(｡•́︿•̀｡)';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                if (!paymentMethod) {
                    document.getElementById('paymentMethodOptions').classList.add('field-error');
                    document.getElementById('wechatOption').classList.add('field-error');
                    document.getElementById('alipayOption').classList.add('field-error');
                    errorDiv.textContent = '还没有完成这个哦宝宝quq';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                // 扣除预存单特殊验证
                if (orderType === 'deduct_prepaid') {
                    if (!isBossInSystemSync(bossName)) {
                        errorDiv.textContent = '请确认名字';
                        errorDiv.classList.remove('hidden');
                        return;
                    }

                    const currentBalance = getBossBalanceFromCache(bossName);
                    const deductAmount = parseFloat(amount);
                    if (currentBalance < deductAmount) {
                        errorDiv.textContent = '余额不足了( ´•̥̥̥ω•̥̥̥ )';
                        errorDiv.classList.remove('hidden');
                        return;
                    }

                    // 金额验证已移除，允许输入任意金额（提示仍保留）

                    const questionContent = document.getElementById('questionContent').value.trim();
                    if (!questionContent) {
                        document.getElementById('questionContent').classList.add('field-error');
                        errorDiv.textContent = '扣除存单必须填写问题内容哦宝宝～';
                        errorDiv.classList.remove('hidden');
                        return;
                    }
                    const divinerId = document.getElementById('divinerId').value.trim();
                    if (!divinerId || divinerId === '无') {
                        document.getElementById('divinerId').classList.add('field-error');
                        errorDiv.textContent = '扣除存单必须填写占卜师哦宝宝～';
                        errorDiv.classList.remove('hidden');
                        return;
                    }
                }

                // 正常单验证（只验证问题内容，金额可任意输入）
                if (orderType === 'normal') {
                    const questionContent = document.getElementById('questionContent').value.trim();
                    if (!questionContent) {
                        document.getElementById('questionContent').classList.add('field-error');
                        errorDiv.textContent = '正常单必须填写问题内容哦宝宝～';
                        errorDiv.classList.remove('hidden');
                        return;
                    }
                }

                // 显示加载状态
                submitBtn.disabled = true;
                submitBtn.textContent = '提交中...';
                errorDiv.classList.add('hidden');

                try {
                    // 获取折扣信息
                    const hasDiscount = orderType === 'normal' && document.getElementById('hasDiscount').checked;
                    const discountValue = hasDiscount ? parseFloat(document.getElementById('discountValue').value) : null;
                    const originalAmount = orderType === 'monthly' ? 0 : parseFloat(amount);

                    // 计算折后金额（抹除小数）
                    let finalAmount = originalAmount;
                    if (hasDiscount && discountValue && discountValue > 0 && discountValue < 10) {
                        finalAmount = Math.floor(originalAmount * discountValue / 10);  // 抹除小数
                    }

                    const orderData = {
                        date: document.getElementById('orderDate').value,
                        bossName: bossName,
                        type: orderType,
                        divinerId: (orderType === 'monthly' || orderType === 'prepaid') ? '无' : document.getElementById('divinerId').value,
                        amount: finalAmount,  // 使用折后金额
                        originalAmount: hasDiscount ? originalAmount : null,  // 原价（如有折扣）
                        discount: discountValue,  // 折扣值（如 8 表示 8折）
                        questionContent: (orderType === 'monthly' || orderType === 'prepaid') ? '' : document.getElementById('questionContent').value,
                        paymentMethod: paymentMethod
                    };

                    const result = await submitOrder(orderData);

                    if (result.success) {
                        document.getElementById('successModal').classList.remove('hidden');
                        setTimeout(() => {
                            navigateTo('receptionist.html');
                        }, 1500);
                    } else {
                        errorDiv.textContent = result.message || '提交失败，请重试';
                        errorDiv.classList.remove('hidden');
                        submitBtn.disabled = false;
                        submitBtn.textContent = '确认提交';
                    }
                } catch (e) {
                    console.error('提交订单出错:', e);
                    errorDiv.textContent = '提交出错: ' + e.message;
                    errorDiv.classList.remove('hidden');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '确认提交';
                }
            }
        });
    </script>
</body>

</html>
